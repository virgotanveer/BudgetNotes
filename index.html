.bill-category-badge{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; background:var(--paper-soft); color:var(--ink-soft); padding:2px 8px; border-radius:999px; border:1px solid var(--line); }
.bill-history-row{ display:grid; grid-template-columns:90px 1fr auto 30px; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:4px; }
:root{
  --bg:#F3F1FA;
  --paper:#FFFFFF;
  --paper-soft:#FBFAFE;
  --paper-raised:#FFFFFF;
  --ink:#2E2B3D;
  --ink-soft:#6B6580;
  --ink-faint:#9B96B5;
  --line:#E3E0F0;
  --sage:#6FA98C;
  --sage-soft:#DCEEE3;
  --sage-glow:rgba(111,169,140,0.15);
  --amber:#E0A93D;
  --amber-soft:#FBEBD0;
  --coral:#DD7E73;
  --coral-soft:#FAE0DC;
  --coral-glow:rgba(221,126,115,0.15);
  --periwinkle:#7C8FD1;
  --periwinkle-soft:#E8ECF8;
  --sand:#CE9C56;
  --sand-soft:#F5E6D0;
  --radius:18px;
  --radius-sm:10px;
  --radius-xs:6px;
  --shadow:0 2px 10px rgba(46,43,61,0.08), 0 1px 2px rgba(46,43,61,0.04);
  --shadow-lift:0 10px 26px rgba(46,43,61,0.12);
  --shadow-glow:0 0 20px rgba(111,169,140,0.2);
  --overlay-bg:rgba(46,43,61,0.35);
  --btn-primary-bg:var(--ink);
  --btn-primary-text:#FFFFFF;
  --hover-bg:#F4F2FB;
  --display-color:var(--ink);
  --font-display:'Caveat', cursive;
  --font-body:'Plus Jakarta Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  --bottom-nav-height:64px;
  --header-height:60px;
}
:root[data-theme="dark"]{
  --bg:#19181D;
  --paper:#232128;
  --paper-soft:#2B2930;
  --paper-raised:#2D2B33;
  --ink:#EDE7DC;
  --ink-soft:#B3ADBD;
  --ink-faint:#7B7588;
  --line:#37343D;
  --sage:#fc785c;
  --sage-soft:#3D2620;
  --sage-glow:rgba(252,120,92,0.15);
  --amber:#F0BD5E;
  --amber-soft:#3D2F14;
  --coral:#FF6B4A;
  --coral-soft:#3A2218;
  --coral-glow:rgba(255,107,74,0.15);
  --periwinkle:#9CA8E8;
  --periwinkle-soft:#2A2D42;
  --sand:#E0B26B;
  --sand-soft:#3D2F14;
  --shadow:0 2px 10px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-lift:0 10px 28px rgba(0,0,0,0.55);
  --shadow-glow:0 0 20px rgba(252,120,92,0.15);
  --overlay-bg:rgba(0,0,0,0.6);

  --btn-primary-text:#19181D;

  --display-color:#fc785c;

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
html{ background:var(--bg); color-scheme:light; }
html[data-theme="dark"]{ color-scheme:dark; }
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  transition:background-color .2s ease, color .2s ease;
  overflow-x:hidden;
}
#app{ max-width:720px; margin:0 auto; padding:24px 20px 80px; min-height:100vh; position:relative; }

@keyframes countUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.counter-anim{ animation:countUp 0.4s ease-out; display:inline-block; }

@keyframes hapticPulse { 0%{ transform:scale(1); } 50%{ transform:scale(0.97); } 100%{ transform:scale(1); } }
.haptic-active{ animation:hapticPulse 0.15s ease; }

@keyframes toastIn { from{ transform:translateY(100%); opacity:0; } to{ transform:translateY(0); opacity:1; } }
@keyframes toastOut { from{ transform:translateY(0); opacity:1; } to{ transform:translateY(100%); opacity:0; } }
.toast-container{ position:fixed; bottom:calc(var(--bottom-nav-height) + 12px); left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; width:calc(100% - 40px); max-width:400px; pointer-events:none; }
.toast{ background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 16px; box-shadow:var(--shadow-lift); font-size:13px; display:flex; align-items:center; justify-content:space-between; gap:12px; pointer-events:auto; animation:toastIn 0.3s ease; }
.toast.removing{ animation:toastOut 0.3s ease forwards; }
.toast-action{ background:none; border:none; color:var(--periwinkle); font-weight:700; font-size:13px; cursor:pointer; padding:4px 8px; border-radius:var(--radius-xs); white-space:nowrap; }
.toast-action:hover{ background:var(--hover-bg); }

.search-bar{ position:sticky; top:0; z-index:40; background:var(--bg); padding:8px 0; margin:-8px -20px 12px; }
.search-inner{ display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:8px 14px; margin:0 20px; box-shadow:var(--shadow); transition:box-shadow 0.2s; }
.search-inner:focus-within{ box-shadow:var(--shadow-glow); border-color:var(--sage); }
.search-icon{ font-size:16px; color:var(--ink-faint); }
.search-input{ flex:1; border:none; background:none; font-family:var(--font-body); font-size:14px; color:var(--ink); outline:none; padding:0; }
.search-input::placeholder{ color:var(--ink-faint); }
.search-clear{ background:none; border:none; color:var(--ink-faint); font-size:16px; cursor:pointer; padding:2px; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
.search-clear:hover{ background:var(--hover-bg); }
.search-results{ position:absolute; top:100%; left:20px; right:20px; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-sm); box-shadow:var(--shadow-lift); max-height:300px; overflow-y:auto; z-index:41; margin-top:4px; }
.search-result-item{ padding:10px 14px; border-bottom:1px solid var(--line); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:space-between; }
.search-result-item:last-child{ border-bottom:none; }
.search-result-item:hover{ background:var(--hover-bg); }
.search-result-type{ font-size:10px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-faint); background:var(--paper-soft); padding:2px 8px; border-radius:999px; }
.search-highlight{ background:var(--sage-soft); color:var(--sage); font-weight:600; padding:0 2px; border-radius:2px; }

/* ---------- STORAGE: localStorage only (reliable on mobile) ---------- */

const Storage = (function(){
  async function initDB(){
    return Promise.resolve();
  }

  async function get(key){
    const v = window.localStorage.getItem(key);
    if(v === null) throw new Error('not found');
    return { key, value: v, shared: false };
  }

  async function set(key, value){
    try {
      window.localStorage.setItem(key, value);
      return { key, value, shared: false };
    } catch(e) {
      throw e;
    }
  }

  async function del(key){
    window.localStorage.removeItem(key);
    return { key, deleted: true, shared: false };
  }

  async function list(prefix){
    const keys = [];
    for(let i = 0; i < window.localStorage.length; i++){
      const k = window.localStorage.key(i);
      if(!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix, shared: false };
  }

  return { initDB, get, set, delete: del, list };
})();

window.storage = Storage;

/* ---------- UNDO SYSTEM ---------- */
const UndoManager = (function(){
  const undoTimers = new Map();

  function push(action, undoFn, delayMs = 5000){
    const id = Date.now() + '_' + Math.random().toString(36).slice(2,7);
    showToast(action, 'Undo', () => {
      undoFn();
      removeToast(id);
    }, id);
    const timer = setTimeout(() => { removeToast(id); }, delayMs);
    undoTimers.set(id, timer);
    return id;
  }

  function removeToast(id){
    const timer = undoTimers.get(id);
    if(timer) clearTimeout(timer);
    undoTimers.delete(id);
    const el = document.querySelector('[data-toast-id="' + id + '"]');
    if(el){ el.classList.add('removing'); setTimeout(() => el.remove(), 300); }
  }

  function showToast(message, actionText, onAction, id){
    const container = document.getElementById('toast-container');
    if(!container) return;
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.dataset.toastId = id;
    toast.innerHTML = '<span>' + escapeHtml(message) + '</span><button class="toast-action">' + escapeHtml(actionText) + '</button>';
    toast.querySelector('.toast-action').addEventListener('click', onAction);
    container.appendChild(toast);
  }

  return { push, removeToast };
})();

const CloudSync = (function(){
  const firebaseConfig = {
    apiKey: "AIzaSyC69GXaUgBoCgPxvucP_NCUZmWzc-1k64Q",
    authDomain: "budgetnotes-61f28.firebaseapp.com",

  };

  let app = null, db = null, unsubscribe = null;
  let lastPushedJSON = null;
  let onRemoteUpdate = null;
  let onStatusChange = null;

  function available(){ return typeof firebase !== 'undefined'; }

  function ensureApp(){
    if(!available()) throw new Error('Firebase SDK not loaded');
    if(!app){
      app = firebase.apps && firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    }
    return db;
  }

  function generateHouseholdId(){
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let out = '';
    const bytes = (window.crypto && window.crypto.getRandomValues) ? window.crypto.getRandomValues(new Uint8Array(24)) : null;
    for(let i = 0; i < 24; i++){
      const idx = bytes ? bytes[i] % chars.length : Math.floor(Math.random() * chars.length);
      out += chars[idx];
    }
    return out;
  }

  function setCallbacks({ remoteUpdate, statusChange }){
    onRemoteUpdate = remoteUpdate || null;
    onStatusChange = statusChange || null;
  }

  function start(householdId){
    stop();
    if(!householdId) return;
    try{
      const database = ensureApp();
      if(onStatusChange) onStatusChange('connecting');
      const ref = database.collection('households').doc(householdId);
      unsubscribe = ref.onSnapshot(
        (snap) => {
          if(onStatusChange) onStatusChange('connected');
          if(!snap.exists) return;
          const data = snap.data();
          const json = data && data.payload;
          if(typeof json !== 'string') return;
          if(json === lastPushedJSON) return;
          const remoteTime = data.updatedAt ? data.updatedAt.toMillis() : Date.now();
          if(onRemoteUpdate) onRemoteUpdate(json, remoteTime);
        },
        (err) => {
          console.warn('CloudSync error:', err);
          if(onStatusChange) onStatusChange('error');
        }
      );
    }catch(e){
      console.warn('CloudSync start failed:', e);
      if(onStatusChange) onStatusChange('error');
    }
  }

  function stop(){
    if(unsubscribe){ unsubscribe(); unsubscribe = null; }
    lastPushedJSON = null;
  }

  async function push(householdId, jsonString){
    if(!householdId) return;
    try{
      const database = ensureApp();
      lastPushedJSON = jsonString;
      await database.collection('households').doc(householdId).set({
        payload: jsonString,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){
      console.warn('CloudSync push failed:', e);
      if(onStatusChange) onStatusChange('error');
    }
  }

  async function fetchOnce(householdId){
    const database = ensureApp();
    const snap = await database.collection('households').doc(householdId).get();
    if(!snap.exists) return null;
    const data = snap.data();
    return (data && typeof data.payload === 'string') ? data.payload : null;
  }

  return { available, generateHouseholdId, setCallbacks, start, stop, push, fetchOnce };
})();

}

function formatMoney(amount, symbol){
  const n = Number(amount) || 0;
  const neg = n < 0;
  const abs = Math.abs(n);
  const fixed = (Math.round(abs*100)/100) % 1 === 0 ? abs.toFixed(0) : abs.toFixed(2);
  const parts = fixed.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const out = parts.join('.');
  return (neg ? '-' : '') + (symbol || '') + out;
}

  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

function formatTodoDateLabel(dateStr){
  const today = todayStr();
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(today + 'T00:00:00');
  const diffDays = Math.round((d - t) / 86400000);
  const monthDay = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  if(diffDays === 0) return 'Today, ' + monthDay;
  if(diffDays === 1) return 'Tomorrow, ' + monthDay;
  if(diffDays === -1) return 'Yesterday, ' + monthDay;
  return d.toLocaleDateString(undefined, { weekday:'long' }) + ', ' + monthDay;
}

function suggestSectionName(duration){

  if(duration === 'yearly') return String(now.getFullYear());

}

function groupEntries(entries){
  const map = new Map();
  entries.forEach(e => {
    const key = (e.desc || '').trim().toLowerCase();
    if(!key) return;
    if(!map.has(key)){
      map.set(key, { desc: e.desc.trim(), amount: 0, count: 0, tagCounts: {} });
    }
    const g = map.get(key);
    g.amount += Number(e.amount) || 0;
    g.count += 1;
    const t = e.tag || 'untagged';
    g.tagCounts[t] = (g.tagCounts[t] || 0) + 1;
  });
  const groups = [...map.values()].map(g => {
    let bestTag = 'untagged', bestCount = -1;
    Object.keys(g.tagCounts).forEach(t => { if(g.tagCounts[t] > bestCount){ bestCount = g.tagCounts[t]; bestTag = t; } });
    return { desc: g.desc, amount: g.amount, count: g.count, tag: bestTag };
  });
  groups.sort((a,b) => b.amount - a.amount);
  return groups;
}

function migrateDue(d){

  const transactions = [];
  if(d.amount){
    transactions.push({
      id: uid(),
      amount: -(Number(d.amount) || 0),
      desc: (d.note || '').trim() || 'Initial amount',
      comment: '',
      date: d.date ? new Date(d.date).toISOString() : (d.createdAt || new Date().toISOString())
    });
  }
  (d.payments || []).forEach(p => {
    transactions.push({ id: p.id || uid(), amount: Number(p.amount) || 0, desc: 'Paid', comment: '', date: p.date || new Date().toISOString() });
  });
  return {
    id: d.id || uid(),
    type: d.type === 'borrowed' ? 'borrowed' : 'lent',
    person: d.person || 'Unnamed',
    transactions,
    createdAt: d.createdAt || new Date().toISOString()
  };
}

/* ---------- SEARCH ---------- */
function performSearch(query){
  const q = query.toLowerCase().trim();
  if(!q) return [];
  const results = [];

  state.sections.forEach(s => {
    if(s.name.toLowerCase().includes(q)) results.push({ type: 'section', title: s.name, id: s.id, subtitle: s.duration + ' budget' });
    s.notes.forEach(n => {
      if(n.title.toLowerCase().includes(q)) results.push({ type: 'note', title: n.title, id: n.id, sectionId: s.id, subtitle: 'in ' + s.name });
      n.entries.forEach(e => {
        if((e.desc || '').toLowerCase().includes(q)){
          results.push({ type: 'entry', title: e.desc, amount: e.amount, id: e.id, noteId: n.id, sectionId: s.id, subtitle: n.title + ' in ' + s.name, date: e.date });
        }
      });
    });
  });

  state.dues.forEach(d => {
    if(d.person.toLowerCase().includes(q)) results.push({ type: 'due', title: d.person, id: d.id, subtitle: d.type });
    d.transactions.forEach(t => {
      if((t.desc || '').toLowerCase().includes(q)){
        results.push({ type: 'transaction', title: t.desc, amount: t.amount, id: t.id, dueId: d.id, subtitle: d.person, date: t.date });
      }
    });
  });

  state.todos.forEach(t => {
    if(t.text.toLowerCase().includes(q)) results.push({ type: 'todo', title: t.text, id: t.id, subtitle: t.date, done: t.done });
  });

  return results.slice(0, 20);
}

function highlightMatch(text, query){
  if(!query) return escapeHtml(text);
  const regex = new RegExp('(' + escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escapeHtml(text).replace(regex, '<span class="search-highlight">$1</span>');
}

/* ---------- CALENDAR HEATMAP ---------- */
function getCalendarData(year, month){
  const entries = allEntriesRich();
  const byDay = {};
  entries.forEach(e => {
    if(!e.date) return;
    const d = new Date(e.date);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    byDay[key] = (byDay[key] || 0) + e.amount;
  });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startOffset = firstDay.getDay();

  const days = [];
  for(let i = 0; i < startOffset; i++) days.push(null);

  const maxSpend = Math.max(...Object.values(byDay), 1);
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const spend = byDay[dateStr] || 0;
    let level = 0;
    if(spend > 0) level = 1;
    if(spend > maxSpend * 0.25) level = 2;
    if(spend > maxSpend * 0.5) level = 3;
    if(spend > maxSpend * 0.75) level = 4;
    days.push({ day: d, dateStr, spend, level, isToday: dateStr === todayStr() });
  }
  return days;
}

/* ---------- BURN RATE ---------- */
function getBurnRate(section){
  const daysMap = { weekly: 7, monthly: 30, yearly: 365 };
  const totalDays = daysMap[section.duration] || 30;
  const created = new Date(section.createdAt);
  const now = new Date();
  const daysElapsed = Math.max(1, Math.floor((now - created) / 86400000));
  const daysRemaining = Math.max(0, totalDays - daysElapsed);
  const expectedSpend = (section.totalBudget / totalDays) * daysElapsed;
  const actualSpend = sectionSpent(section);
  const burnRate = actualSpend / Math.max(1, daysElapsed);
  const projectedTotal = burnRate * totalDays;
  const status = actualSpend > expectedSpend * 1.1 ? 'over' : actualSpend > expectedSpend * 0.9 ? 'on-track' : 'ahead';
  return { daysElapsed, daysRemaining, expectedSpend, actualSpend, burnRate, projectedTotal, status };
}

/* ---------- INSIGHTS ---------- */
function getInsights(){
  const entries = allEntriesFlat();
  const now = new Date();
  const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const lastMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0);

  const thisMonthEntries = entries.filter(e => e.date && new Date(e.date) >= thisMonthStart);
  const lastMonthEntries = entries.filter(e => e.date && new Date(e.date) >= lastMonthStart && new Date(e.date) <= lastMonthEnd);

  const thisMonthTotal = thisMonthEntries.reduce((s,e) => s + e.amount, 0);
  const lastMonthTotal = lastMonthEntries.reduce((s,e) => s + e.amount, 0);
  const vsLastMonth = lastMonthTotal > 0 ? ((thisMonthTotal - lastMonthTotal) / lastMonthTotal * 100).toFixed(1) : 0;

  const untaggedCount = entries.filter(e => !e.tag).length;
  const groups = groupEntries(entries);
  const topCategory = groups.length > 0 ? groups[0] : null;

  return { vsLastMonth, untaggedCount, topCategory, thisMonthTotal, lastMonthTotal };
}

/* ---------- TEMPLATES ---------- */
function getTemplatesForNote(sectionId, noteId){
  const key = sectionId + ':' + noteId;
  return state.entryTemplates[key] || [];
}

function addTemplate(sectionId, noteId, desc, amount, tag){
  const key = sectionId + ':' + noteId;
  if(!state.entryTemplates[key]) state.entryTemplates[key] = [];
  const existing = state.entryTemplates[key].findIndex(t => t.desc.toLowerCase() === desc.toLowerCase());
  if(existing >= 0){
    state.entryTemplates[key][existing] = { desc, amount, tag };
  } else {
    state.entryTemplates[key].push({ desc, amount, tag });
    if(state.entryTemplates[key].length > 10) state.entryTemplates[key].shift();
  }
}

/* ---------- DUE DATE HELPERS ---------- */
function getDueDateStatus(dueDateStr){
  if(!dueDateStr) return null;
  const due = new Date(dueDateStr);
  const now = new Date();
  const days = Math.ceil((due - now) / 86400000);
  if(days < 0) return { status: 'overdue', days: Math.abs(days), label: Math.abs(days) + ' days overdue' };
  if(days <= 7) return { status: 'soon', days, label: days + ' days left' };
  return { status: 'later', days, label: days + ' days left' };
}

/* ---------- DATA HELPERS ---------- */
function allEntriesFlat(){
  const out = [];
  state.sections.forEach(s => s.notes.forEach(n => n.entries.forEach(e => out.push(e))));
  return out;
}

function allEntriesRich(){
  const out = [];
  state.sections.forEach(s => s.notes.forEach(n => n.entries.forEach(e =>
    out.push(Object.assign({}, e, { noteName: n.title, sectionName: s.name, currency: s.currency }))
  )));
  return out;
}

function entriesOnDate(dateStr){
  return allEntriesRich().filter(e => {
    if(!e.date) return false;
    const d = new Date(e.date);
    const local = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    return local === dateStr;
  });
}

function entriesByDay(maxDays){
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - maxDays + 1);
  cutoff.setHours(0,0,0,0);
  const rich = allEntriesRich().filter(e => e.date && new Date(e.date) >= cutoff);
  const byDay = {};
  rich.forEach(e => {
    const d = new Date(e.date);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if(!byDay[key]) byDay[key] = { dateStr: key, entries: [] };
    byDay[key].entries.push(e);
  });
  return Object.values(byDay).sort((a,b) => b.dateStr.localeCompare(a.dateStr));
}

function findSection(sectionId){ return state.sections.find(s => s.id === sectionId); }
function findNote(sectionId, noteId){
  const s = findSection(sectionId);
  return s ? s.notes.find(n => n.id === noteId) : null;
}

function sectionAllocated(section){ return section.notes.reduce((s,n) => s + (Number(n.budget)||0), 0); }
function sectionSpent(section){ return section.notes.reduce((s,n) => s + n.entries.reduce((s2,e)=>s2+e.amount,0), 0); }
function sectionSavings(section){ return Math.max(0, section.totalBudget - sectionAllocated(section)); }
function noteSpent(note){ return note.entries.reduce((s,e) => s + e.amount, 0); }

function txTotals(due){
  let principal = 0, settled = 0;
  due.transactions.forEach(t => { if(t.amount < 0) principal += -t.amount; else settled += t.amount; });
  return { principal, settled, pending: principal - settled };
}

function dueTypeLabels(type){
  return type === 'lent'
    ? { negBtn:'Lent (-)', posBtn:'Received (+)', principalLabel:'Lent', settledLabel:'Received', bannerLabel:'Amount to receive' }
    : { negBtn:'Borrowed (-)', posBtn:'Repaid (+)', principalLabel:'Borrowed', settledLabel:'Paid', bannerLabel:'Amount to pay' };
}

function dueGroupTotal(type){
  return state.dues.filter(d => d.type === type).reduce((s,d) => s + Math.max(0, txTotals(d).pending), 0);
}

/* ---------- LOAD / SAVE ---------- */
async function loadData(){
  let savedHouseholdId = null;
  
  try{
    await Storage.initDB();
  }catch(e){ console.warn('IndexedDB init failed:', e); }

  try{
    const res = await window.storage.get(STORAGE_KEY);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      // Save householdId before any potential overwrites
      savedHouseholdId = parsed.settings && parsed.settings.householdId;
      state.settings = parsed.settings || { defaultCurrency: 'Rs ' };
      if(Array.isArray(parsed.sections)){
        state.sections = parsed.sections;
      } else if(Array.isArray(parsed.notes) && parsed.notes.length){
        const migrated = {
          id: uid(), name: 'My Notes', totalBudget: parsed.notes.reduce((s,n) => s + (Number(n.budget)||0), 0),
          duration: 'monthly',
          currency: parsed.notes[0].currency || state.settings.defaultCurrency || 'Rs ',
          createdAt: new Date().toISOString(),
          notes: parsed.notes.map(n => ({
            id: n.id || uid(),
            title: n.title || 'Untitled note',
            icon: '',
            budget: Number(n.budget) || 0,
            entries: (n.entries || []).map(e => ({ id: e.id || uid(), amount: e.amount, desc: e.desc, date: e.date, tag: e.tag || null })),
            createdAt: n.createdAt || new Date().toISOString()
          }))
        };
        state.sections = [migrated];
        state.migrationNotice = 'Your earlier notes were moved into a new section called "My Notes" so nothing was lost.';
      } else {
        state.sections = [];
      }
      state.dues = (parsed.dues || []).map(migrateDue);
      state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
      state.bills = Array.isArray(parsed.bills) ? parsed.bills : [];
      state.entryTemplates = parsed.entryTemplates || {};
      state.savingsGoals = parsed.savingsGoals || {};
    }
  } catch(e){
    console.warn('Load failed, starting fresh:', e);
    state.sections = [];
    state.dues = [];
    state.todos = [];
    state.settings = { defaultCurrency: 'Rs ' };
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify({ sections: [], dues: [], todos: [], settings: state.settings }));
    }catch(e2){ console.error('Could not initialize storage', e2); }
  }
  
  // Restore householdId if it was lost during parsing
  if(savedHouseholdId && !state.settings.householdId){
    state.settings.householdId = savedHouseholdId;
  }
  
  state.todoDate = todayStr();
  if(!state.settings.theme) state.settings.theme = detectSystemTheme();
  applyTheme();
  if(state.sections.length) state.expandedSectionIds[state.sections[0].id] = true;
  state.loaded = true;
  render();

  CloudSync.setCallbacks({
    remoteUpdate: applyRemoteState,
    statusChange: (status) => { state.syncStatus = status; render(); }
  });
  
  if(state.settings.householdId){
    state.syncStatus = 'connecting';
    CloudSync.start(state.settings.householdId);
  }
}

async function saveData(){
  const jsonString = JSON.stringify({
    sections: state.sections,
    dues: state.dues,
    todos: state.todos,
    bills: state.bills,
    settings: state.settings,
    entryTemplates: state.entryTemplates,
    savingsGoals: state.savingsGoals
  });
  try{
    await window.storage.set(STORAGE_KEY, jsonString);
    state.lastSavedAt = Date.now();
    state.error = null;  // Clear error on success
    render();
  }catch(e){
    console.error('Save failed:', e);
    state.error = 'Could not save: ' + (e.message || 'storage error');
    render();
  }
  if(state.settings.householdId){
    CloudSync.push(state.settings.householdId, jsonString);
  }
}

function applyRemoteState(jsonString, remoteTimestamp){
  try{
    if(remoteTimestamp && state.lastSavedAt > remoteTimestamp){
      console.log('Local data is newer, skipping remote update');
      return;
    }
    const parsed = JSON.parse(jsonString);
    
    // Preserve local-only settings that shouldn't be overwritten
    const currentHouseholdId = state.settings.householdId;
    
    state.settings = Object.assign({}, state.settings, parsed.settings || {});
    
    // Ensure householdId is never lost
    if(currentHouseholdId && !state.settings.householdId){
      state.settings.householdId = currentHouseholdId;
    }
    
    if(Array.isArray(parsed.sections)){
      state.sections = parsed.sections;
    }
    state.dues = (Array.isArray(parsed.dues) ? parsed.dues : []).map(migrateDue);
    state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
    state.bills = Array.isArray(parsed.bills) ? parsed.bills : [];
    state.entryTemplates = parsed.entryTemplates || {};
    state.savingsGoals = parsed.savingsGoals || {};
    
    // Save to localStorage using current state (includes householdId)
    saveData().catch((e) => console.warn('Background save failed:', e));
    
    applyTheme();
    render();
  }catch(e){
    console.warn('Failed to apply remote update:', e);
  }
}

function addTransaction(dueId, rawValue, buttonSign, dateStr){
  const due = state.dues.find(d => d.id === dueId);
  if(!due) return;
  const trimmed = (rawValue || '').trim();
  const match = trimmed.match(/^([+-])?\s*([\d,]+(?:\.\d{1,2})?)\s+([^.]+)(?:\.(.*))?$/);
  if(!match){
    state.transactionError = trimmed ? 'Try an amount then a reason, like "5000 medical help"' : null;
    pendingFocus = 'transaction-input';
    render();
    return;
  }
  const sign = match[1] || buttonSign;
  if(!sign){
    state.transactionError = 'Tap Borrowed or Repaid below, or start with + or -.';
    pendingFocus = 'transaction-input';
    render();
    return;
  }
  state.transactionError = null;
  const amountAbs = parseFloat(match[2].replace(/,/g, ''));
  const desc = match[3].trim();
  const comment = match[4] ? match[4].trim() : '';
  const signedAmount = sign === '-' ? -amountAbs : amountAbs;
  const txDate = dateStr ? new Date(dateStr + 'T00:00:00').toISOString() : new Date().toISOString();
  due.transactions.unshift({ id: uid(), amount: signedAmount, desc, comment, date: txDate });
  state.showAddTxFor = null;
  hapticSuccess();
  render();
  saveData();
}

function shareRecords(dueId){
  const due = state.dues.find(d => d.id === dueId);
  if(!due) return;
  const sym = state.settings.defaultCurrency;
  const labels = dueTypeLabels(due.type);
  const { principal, settled, pending } = txTotals(due);
  const lines = [];
  lines.push(due.person + ' - ' + (due.type === 'lent' ? 'Lent' : 'Borrowed'));
  lines.push(labels.principalLabel + ': ' + formatMoney(principal, sym) + '   ' + labels.settledLabel + ': ' + formatMoney(settled, sym) + '   Pending: ' + formatMoney(Math.max(0,pending), sym));
  lines.push('');
  due.transactions.slice().reverse().forEach(t => {
    const sign = t.amount < 0 ? '-' : '+';
    lines.push(formatDate(t.date) + '  ' + sign + formatMoney(Math.abs(t.amount), sym) + '  ' + t.desc + (t.comment ? ' (' + t.comment + ')' : ''));
  });
  const text = lines.join('\n');
  if(navigator.share){
    navigator.share({ title: due.person + ' - BudgetNotes', text }).catch(() => {});
  } else {
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = due.person.replace(/[^a-z0-9]+/gi, '-') + '-records.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

async function joinHousehold(code){
  const trimmed = (code || '').trim();
  if(trimmed.length < 20){
    state.syncError = 'That does not look like a full household code. Ask your partner to copy it again.';
    render();
    return;
  }
  if(state.syncBusy) return;
  state.syncBusy = true; state.syncError = null;
  render();
  try{
    const remoteJson = await CloudSync.fetchOnce(trimmed);
    if(!remoteJson){
      state.syncError = 'No household found with that code. Double-check it, or ask your partner to create one first.';
      state.syncBusy = false;
      render();
      return;
    }
    applyRemoteState(remoteJson);
    state.settings.householdId = trimmed;
    await saveData();
    state.syncStatus = 'connecting';
    CloudSync.start(trimmed);
    state.showJoinHousehold = false;
  }catch(e){
    console.warn('Join household failed:', e);
    state.syncError = 'Could not reach the sync server. Check your connection and try again.';
  }
  state.syncBusy = false;
  render();
}

    });
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'budgetnotes-export-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(Array.isArray(parsed.sections)){
        state.sections = parsed.sections;
      } else if(Array.isArray(parsed.notes)){
        state.sections = parsed.notes.length ? [{
          id: uid(), name: 'My Notes', duration:'monthly',
          totalBudget: parsed.notes.reduce((s,n)=>s+(Number(n.budget)||0),0),
          currency: state.settings.defaultCurrency || 'Rs ', createdAt: new Date().toISOString(),
          notes: parsed.notes.map(n => ({ id:n.id||uid(), title:n.title||'Untitled note', icon:'', budget:Number(n.budget)||0, entries:(n.entries||[]).map(e=>({id:e.id||uid(),amount:e.amount,desc:e.desc,date:e.date,tag:e.tag||null})), createdAt:n.createdAt||new Date().toISOString() }))
        }] : [];
      } else {
        state.sections = [];
      }
      state.dues = (Array.isArray(parsed.dues) ? parsed.dues : []).map(migrateDue);
      state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
      state.entryTemplates = parsed.entryTemplates || {};
      state.savingsGoals = parsed.savingsGoals || {};
      state.settings = parsed.settings || state.settings;
      state.importError = null;
      state.showSettings = false;
      render();
      saveData();
    }catch(err){
      state.importError = 'That file could not be read. Make sure it is a BudgetNotes backup.';
      render();
    }
  };
  reader.readAsText(file);
}

/* ---------- BULK ENTRY ---------- */
function processBulkEntry(sectionId, noteId, text){
  const lines = text.split('\n').filter(l => l.trim());
  const note = findNote(sectionId, noteId);
  if(!note) return;
  const added = [];
  lines.forEach(line => {
    const match = line.trim().match(/^(-?[\d,]+(?:\.\d{1,2})?)\s+(.+)$/);
    if(match){
      const amount = parseFloat(match[1].replace(/,/g, ''));
      const desc = match[2].trim();
      note.entries.unshift({ id: uid(), amount, desc, date: new Date().toISOString(), tag: null });
      added.push({ amount, desc });
    }
  });
  if(added.length > 0){
    hapticSuccess();
    render();
    saveData();
    UndoManager.push(added.length + ' entries added', () => {
      for(let i = 0; i < added.length; i++) note.entries.shift();
      render(); saveData();
    });
  }
  state.showBulkEntry = false;
}

/* ---------- QUICK ADD ---------- */
function quickAdd(rawValue, sectionId, noteId){
  const trimmed = (rawValue || '').trim();
  const match = trimmed.match(/^(-?[\d,]+(?:\.\d{1,2})?)\s+(.+)$/);
  if(!match) return false;
  const amount = parseFloat(match[1].replace(/,/g, ''));
  const desc = match[2].trim();
  const s = findSection(sectionId);
  const n = findNote(sectionId, noteId);
  if(!s || !n) return false;
  n.entries.unshift({ id: uid(), amount, desc, date: new Date().toISOString(), tag: null });
  addTemplate(sectionId, noteId, desc, amount, null);
  hapticSuccess();
  render();
  saveData();
  return true;
}

  const tagTitle = entry.tag === 'essential' ? 'Essential - click to change' : entry.tag === 'discretionary' ? 'Discretionary - click to change' : 'Untagged - click to tag';
  return `
  <div class="ledger-row">
    <button class="tag-btn ${tagClass}" data-action="cycle-tag" data-section-id="${section.id}" data-note-id="${note.id}" data-entry-id="${entry.id}" title="${tagTitle}" aria-label="${tagTitle}"></button>
    <span class="mono amount">${formatMoney(entry.amount, section.currency)}</span>
    <span class="desc">${escapeHtml(entry.desc)}</span>
    <span class="ink-faint date">${formatDate(entry.date)}</span>
    <button class="icon-btn ghost ${isConfirm?'danger':''}" data-action="${isConfirm?'confirm-delete-entry':'ask-delete-entry'}" data-section-id="${section.id}" data-note-id="${note.id}" data-entry-id="${entry.id}" aria-label="Delete entry">${isConfirm?'Confirm':'&#10005;'}</button>
  </div>`;
}

function renderTemplates(section, note){
  const templates = getTemplatesForNote(section.id, note.id);
  if(templates.length === 0) return '';
  return `
  <div class="template-chips">
    ${templates.slice().reverse().map(t => `
      <button class="template-chip" data-action="use-template" data-section-id="${section.id}" data-note-id="${note.id}" data-desc="${escapeHtml(t.desc)}" data-amount="${t.amount}">
        <span>${escapeHtml(t.desc)}</span>
        <span class="chip-amount">${formatMoney(t.amount, section.currency)}</span>
      </button>
    `).join('')}
  </div>`;
}

function renderNoteDetail(section, note){
  const spent = noteSpent(note);
  const remaining = note.budget - spent;
  const pct = note.budget > 0 ? (spent/note.budget*100) : 0;
  const clamped = Math.min(100, Math.max(0, pct));
  const status = pct > 100 ? 'coral' : (pct >= 70 ? 'amber' : 'sage');
  const groups = groupEntries(note.entries);
  const availableToAllocate = sectionSavings(section);
  const templates = renderTemplates(section, note);

  return `
  <div class="view">
    <button class="link-back" data-action="back-to-sections">&larr; ${escapeHtml(section.name)}</button>
    <div class="detail-head">
      <h2 class="note-title-lg">${note.icon ? escapeHtml(note.icon)+' ' : ''}${escapeHtml(note.title)}</h2>
      <div class="budget-edit">
        <label for="note-budget-input">Budget</label>
        <input id="note-budget-input" class="budget-input-inline" type="number" min="0" step="0.01" value="${note.budget}" data-section-id="${section.id}" data-note-id="${note.id}" />
      </div>
    </div>
    <div class="bar bar-${status} bar-lg"><div class="bar-fill" style="width:${clamped}%"></div></div>
    <div class="detail-stats">
      <span class="mono">${formatMoney(spent, section.currency)} spent</span>
      <span class="ink-faint">&middot;</span>
      <span class="mono ${remaining<0?'text-coral':'ink-soft'}">${remaining<0 ? formatMoney(Math.abs(remaining), section.currency)+' over' : formatMoney(remaining, section.currency)+' left'}</span>
    </div>
    <div class="allocate-hint">${formatMoney(availableToAllocate, section.currency)} still available to allocate in ${escapeHtml(section.name)}</div>

    ${templates}

    ${groups.length > 0 ? `
      <div class="card budget-items-card">
        <div class="bi-head"><span class="bi-title">Budget items (${groups.length})</span></div>
        ${groups.map(g => bi_row(g, note, section)).join('')}
      </div>` : ''}

    <form class="entry-form" data-form="entry" data-section-id="${section.id}" data-note-id="${note.id}">
      <input id="entry-input" name="entry" type="text" autocomplete="off" placeholder="150 Groceries" />
      <button type="submit" class="btn-primary small">Add</button>
    </form>
    <div id="entry-preview" class="entry-preview"></div>
    ${state.entryError ? `<div class="form-error">${escapeHtml(state.entryError)}</div>` : ''}

    <div style="margin-bottom:10px;">
      <button class="btn-secondary small" data-action="toggle-bulk-entry">${state.showBulkEntry ? 'Hide Bulk Entry' : 'Bulk Entry'}</button>
    </div>

    ${state.showBulkEntry ? `
    <div style="margin-bottom:16px;">
      <textarea class="bulk-textarea" id="bulk-textarea" placeholder="150 Milk&#10;45 Bread&#10;200 Eggs"></textarea>
      <div id="bulk-preview" class="bulk-preview"></div>
      <button class="btn-primary small" data-action="submit-bulk" data-section-id="${section.id}" data-note-id="${note.id}" style="margin-top:8px;">Add All</button>
    </div>` : ''}

    ${note.entries.length===0
      ? emptyState('Nothing logged yet', 'Type an amount and what it was for, then press Add.', null, null)
      : `<div class="ledger">${note.entries.map(en => entryRow(en, section, note)).join('')}</div>`}

    <div style="margin-top:18px;">
      <button class="btn-secondary small ${state.confirmDeleteNote===(section.id+':'+note.id)?'danger':''}" data-action="${state.confirmDeleteNote===(section.id+':'+note.id)?'confirm-delete-note':'ask-delete-note'}" data-section-id="${section.id}" data-note-id="${note.id}">${state.confirmDeleteNote===(section.id+':'+note.id)?'Confirm delete note':'Delete this note'}</button>
    </div>
  </div>`;
}


function todoRow(t, opts){
  opts = opts || {};
  const isConfirm = state.confirmDeleteTodo === t.id;
  return `
  <div class="todo-row ${t.done?'done':''}">
    <button class="todo-check ${t.done?'checked':''}" data-action="toggle-todo" data-id="${t.id}" aria-label="${t.done?'Mark not done':'Mark done'}">${t.done?'&#10003;':''}</button>
    <span class="todo-text">${escapeHtml(t.text)}</span>
    ${opts.showDate ? `<span class="ink-faint todo-date-tag">${formatDate(t.date)}</span>` : ''}
    <button class="icon-btn ghost ${isConfirm?'danger':''}" data-action="${isConfirm?'confirm-delete-todo':'ask-delete-todo'}" data-id="${t.id}" aria-label="Delete task">${isConfirm?'Confirm':'&#10005;'}</button>
  </div>`;
}

function renderTodosView(){
  const today = todayStr();
  const viewDate = state.todoDate || today;
  const isToday = viewDate === today;
  let dayTodos = state.todos.filter(t => t.date === viewDate);
  dayTodos = dayTodos.slice().sort((a,b) => (a.done?1:0) - (b.done?1:0));
  const carriedOver = isToday ? state.todos.filter(t => t.date < viewDate && !t.done) : [];
  const totalForProgress = dayTodos.length + carriedOver.length;
  const doneCount = dayTodos.filter(t => t.done).length;
  const pct = totalForProgress > 0 ? Math.round(doneCount/totalForProgress*100) : 0;

  return `
  <div class="view">
    <div class="todo-nav">
      <button class="icon-btn" data-action="todo-prev-day" aria-label="Previous day">&#8249;</button>
      <span class="todo-date-main">${formatTodoDateLabel(viewDate)}</span>
      <button class="icon-btn" data-action="todo-next-day" aria-label="Next day">&#8250;</button>
    </div>
    ${!isToday ? `<button class="link-back" data-action="todo-jump-today" style="display:block;margin:0 auto 14px;">&larr; Back to today</button>` : ''}

    ${totalForProgress > 0 ? `
      <div class="bar bar-sage"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="todo-progress-label">${doneCount} of ${totalForProgress} done</div>
    ` : ''}

    <form class="entry-form" data-form="todo" data-date="${viewDate}">
      <input id="todo-input" name="todo" type="text" autocomplete="off" placeholder="${isToday ? 'What do you need to do today?' : 'Add a task for this day'}" />
      <button type="submit" class="btn-primary small">Add</button>
    </form>

    ${carriedOver.length > 0 ? `
      <div class="todo-section-label">Carried over</div>
      <div class="todo-list">${carriedOver.map(t => todoRow(t, {showDate:true})).join('')}</div>
    ` : ''}

    ${dayTodos.length > 0
      ? `${carriedOver.length > 0 ? `<div class="todo-section-label">${isToday ? 'Today' : 'This day'}</div>` : ''}<div class="todo-list">${dayTodos.map(t => todoRow(t, {showDate:false})).join('')}</div>`
      : (carriedOver.length === 0 ? emptyState(
          isToday ? 'Nothing on your list' : 'No tasks for this day',
          isToday ? 'Add something below to get started.' : 'Tasks you add here will only show up on this day.',
          null, null) : '')}
  </div>`;
}

function txRow(t, due, sym){
  const isConfirm = state.confirmDeleteTx === t.id;
  const positive = t.amount >= 0;
  return `
  <div class="tx-row ${positive?'positive':'negative'}">
    <span class="mono tx-amount">${positive?'+':'-'}${formatMoney(Math.abs(t.amount), sym)}</span>
    <span class="tx-desc">${escapeHtml(t.desc)}${t.comment ? ` <span class="ink-faint">(${escapeHtml(t.comment)})</span>` : ''}</span>
    <span class="tx-date">${formatDate(t.date)}</span>
    <button class="icon-btn ghost ${isConfirm?'danger':''}" data-action="${isConfirm?'confirm-delete-tx':'ask-delete-tx'}" data-due-id="${due.id}" data-tx-id="${t.id}" aria-label="Delete transaction">${isConfirm?'Confirm':'&#10005;'}</button>
  </div>`;
}

function dueCard(due){
  const sym = state.settings.defaultCurrency;
  const labels = dueTypeLabels(due.type);
  const { principal, settled, pending } = txTotals(due);
  const displayPending = Math.max(0, pending);
  const expanded = state.expandedDueId === due.id;
  const isConfirm = state.confirmDeleteDue === due.id;
  const accent = due.type === 'lent' ? 'periwinkle' : 'sand';
  const dueStatus = due.dueDate ? getDueDateStatus(due.dueDate) : null;

  return `
  <div class="card due-card">
    <div class="due-top" data-action="toggle-due" data-id="${due.id}" role="button" tabindex="0">
      <div class="due-person-row">
        <span class="due-person">${escapeHtml(due.person)}</span>
        <button class="icon-btn ghost" data-action="open-edit-lender" data-id="${due.id}" title="Rename" aria-label="Rename lender">&#9998;</button>
      </div>
      <div class="due-amount-row">
        ${dueStatus ? `<span class="due-date-badge ${dueStatus.status}">${dueStatus.label}</span>` : ''}
        <span class="due-amount mono ${displayPending<=0?'text-sage':'accent-'+accent}">${displayPending<=0 ? 'Settled &#10003;' : formatMoney(displayPending, sym)}</span>
        <span class="chevron ${expanded?'open':''}">&#9656;</span>
      </div>
    </div>
    <div class="due-stats">
      <span>${labels.principalLabel}: <b class="mono">${formatMoney(principal, sym)}</b></span>
      <span>${labels.settledLabel}: <b class="mono">${formatMoney(settled, sym)}</b></span>
    </div>
    ${displayPending > 0 ? `
      <div class="due-banner">
        <span class="due-banner-amount mono">${formatMoney(displayPending, sym)}</span>
        <span class="due-banner-label">${labels.bannerLabel}</span>
      </div>` : ''}
    ${expanded ? `
      <div class="due-expand">
        ${due.transactions.length === 0 ? `<p class="ink-faint" style="font-size:13px;margin:0 0 4px;">No transactions yet.</p>` : `<div class="tx-list">${due.transactions.map(t => txRow(t, due, sym)).join('')}</div>`}
        <button class="btn-secondary small" data-action="open-add-tx" data-id="${due.id}" style="align-self:flex-start;">+ Add Transaction</button>
        <div class="due-actions-row">
          <button class="btn-secondary small" data-action="share-due" data-id="${due.id}">Share Records</button>
          <button class="btn-secondary small" data-action="share-whatsapp" data-id="${due.id}">WhatsApp</button>
          <button class="btn-secondary small ${isConfirm?'danger':''}" data-action="${isConfirm?'confirm-delete-due':'ask-delete-due'}" data-id="${due.id}">${isConfirm?'Confirm delete':'Delete Lender'}</button>
        </div>
      </div>` : ''}
  </div>`;
}

function renderDuesView(){
  const sym = state.settings.defaultCurrency;
  const lentTotal = dueGroupTotal('lent');
  const borrowedTotal = dueGroupTotal('borrowed');
  const filtered = state.dues.filter(d => d.type === state.duesTab);
  return `
  <div class="view">
    <div class="dues-summary-row">
      <div class="dues-summary-card ${state.duesTab==='lent'?'active':''}" data-action="set-dues-tab" data-duestab="lent" role="button" tabindex="0">
        <span class="dues-summary-label accent-periwinkle">&#8593; Lent</span>
        ${lentTotal<=0 ? `<span class="dues-summary-value text-sage">Settled &#10003;</span>` : `<span class="dues-summary-value mono accent-periwinkle">${formatMoney(lentTotal, sym)}</span>`}
      </div>
      <div class="dues-summary-card ${state.duesTab==='borrowed'?'active':''}" data-action="set-dues-tab" data-duestab="borrowed" role="button" tabindex="0">
        <span class="dues-summary-label accent-sand">&#8595; Borrowed</span>
        ${borrowedTotal<=0 ? `<span class="dues-summary-value text-sage">Settled &#10003;</span>` : `<span class="dues-summary-value mono text-coral">${formatMoney(borrowedTotal, sym)}</span>`}
      </div>

    <div class="view-head">

      <button class="btn-primary" data-action="open-new-due">+ Add lender</button>

    ${filtered.length===0
      ? emptyState(
          state.duesTab==='lent' ? 'No one owes you yet' : 'You do not owe anyone yet',
          state.duesTab==='lent' ? 'Add a lender to start tracking money you have lent out.' : 'Add a lender to start tracking a loan, EMI, or money you owe.',
          '+ Add lender', 'open-new-due')
      : `<div class="due-list">${filtered.map(dueCard).join('')}</div>`}
  </div>`;
}

function currencyOptions(selected){
  const opts = [['Rs ','Rs Pakistani Rupee'],['$','$ Dollar'],['&#8377;','&#8377; Indian Rupee'],['&#8364;','&#8364; Euro'],['&#163;','&#163; Pound'],['&#165;','&#165; Yen']];
  return opts.map(([v,label]) => `<option value="${v}" ${selected===v?'selected':''}>${label}</option>`).join('') + `<option value="custom">Custom symbol</option>`;
}

function sectionModal(){
  const editing = state.editSectionId ? findSection(state.editSectionId) : null;
  const copyFromId = !editing ? (state.sectionCopyFromId || 'scratch') : null;
  const copySource = (copyFromId && copyFromId !== 'scratch') ? findSection(copyFromId) : null;

  const duration = editing ? editing.duration : (copySource ? copySource.duration : 'monthly');
  const name = editing ? editing.name : suggestSectionName(duration);
  const budget = editing ? editing.totalBudget : (copySource ? copySource.totalBudget : '');
  const currency = editing ? editing.currency : (copySource ? copySource.currency : (state.settings.defaultCurrency || 'Rs '));

  const showCopyOption = !editing && state.sections.length > 0;

  return `
  <div class="overlay">
    <div class="modal">
      <h3>${editing ? 'Edit section' : 'New section'}</h3>
      <form data-form="section" data-edit-id="${editing ? editing.id : ''}">
        ${showCopyOption ? `
        <label>Start from
          <select name="copyFrom">
            <option value="scratch" ${copyFromId==='scratch'?'selected':''}>Scratch (blank)</option>
            ${state.sections.map(s => `<option value="${s.id}" ${copyFromId===s.id?'selected':''}>Copy from "${escapeHtml(s.name)}"</option>`).join('')}
          </select>
        </label>
        ${copySource ? `<p class="copy-hint">${copySource.notes.length} ${copySource.notes.length===1?'category':'categories'} will be copied in with their budgets, but no entries.</p>` : ''}
        ` : ''}
        <label>Duration
          <select name="duration">
            <option value="weekly" ${duration==='weekly'?'selected':''}>Weekly</option>
            <option value="monthly" ${duration==='monthly'?'selected':''}>Monthly</option>
            <option value="yearly" ${duration==='yearly'?'selected':''}>Yearly</option>
          </select>
        </label>
        <label>Name
          <input name="name" type="text" value="${escapeHtml(name)}" placeholder="May 2026" required />
        </label>
        <label>Total budget
          <input name="totalBudget" type="number" min="0" step="0.01" value="${budget}" placeholder="65000" required />
        </label>
        <label>Currency
          <select name="currency">${currencyOptions(currency)}</select>
        </label>
        <input name="customCurrency" type="text" maxlength="3" placeholder="Custom symbol" class="custom-currency-input" />
        <div class="modal-actions">
          <button type="button" class="btn-secondary" data-action="close-modal">Cancel</button>
          <button type="submit" class="btn-primary">${editing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    </div>
  </div>`;
}

          <span class="sync-dot ${state.syncStatus||''}"></span>
          <span>${escapeHtml(statusLabel)}</span>
        </div>
        <div class="sync-code-box">
          <span class="sync-code-text">${escapeHtml(householdId)}</span>
          <button type="button" class="icon-btn ghost" data-action="copy-household-code" aria-label="Copy code">Copy</button>

      </div>`;

      <div class="settings-row" style="display:block;">

          <label>Code from your partner

          <div class="sync-actions-row">
            <button type="button" class="btn-secondary small" data-action="cancel-join-household">Cancel</button>

      </div>`;
  } else {

      <div class="settings-row" style="display:block;">
        <div class="settings-label">Sync with partner</div>
        <p class="ink-faint small-print" style="margin-top:0;">Add transactions on two phones and see each other's changes live.</p>
        <div class="sync-actions-row">
          <button type="button" class="btn-secondary small" data-action="start-create-household" ${state.syncBusy?'disabled':''}>${state.syncBusy ? 'Creating...' : 'Create & share a code'}</button>

  return `

    <div class="modal">
      <h3>Backup & settings</h3>
      ${syncSection}
      <div class="settings-row">
        <div>
          <div class="settings-label">Default currency</div>
          <select id="default-currency-select">${currencyOptions(c).replace('<option value="custom">Custom symbol</option>','')}</select>
        </div>
      </div>
      <div class="settings-row">
        <button class="btn-secondary" data-action="export-data">Export JSON</button>
        <button class="btn-secondary" data-action="export-csv">Export CSV</button>
        <button class="btn-secondary" data-action="trigger-import">Import backup</button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
      ${state.importError ? `<div class="form-error">${escapeHtml(state.importError)}</div>` : ''}
      <div class="settings-row" style="display:block;">
        <div class="settings-label">Keyboard shortcuts</div>
        <p class="ink-faint small-print"><span class="kbd">Ctrl+K</span> Search &nbsp; <span class="kbd">Ctrl+N</span> New entry &nbsp; <span class="kbd">Ctrl+/</span> Toggle theme &nbsp; <span class="kbd">Esc</span> Close modal</p>
      </div>
      <p class="ink-faint small-print">Everything here stays in your account - nothing is shared${householdId ? ' beyond the partner you sync with' : ''}.</p>
      <div class="modal-actions">
        <button type="button" class="btn-primary" data-action="close-modal">Done</button>
      </div>
    </div>
  </div>`;
}


/* ---------- RENDERING ---------- */

function emptyState(title, body, cta, ctaAction){
  return '<div class="empty"><div class="empty-title">' + escapeHtml(title) + '</div><div class="empty-body">' + escapeHtml(body) + '</div>' + (cta ? '<button class="btn-primary" data-action="' + ctaAction + '">' + escapeHtml(cta) + '</button>' : '') + '</div>';
}

function renderHeader(){
  const isDark = state.settings.theme === 'dark';
  return '<header class="app-header"><div class="brand"><span class="brand-mark">BudgetNotes</span><span class="brand-tag">write it. track it.</span></div><div class="header-actions"><button class="icon-btn" data-action="toggle-search" title="Search" aria-label="Search">&#128269;</button><button class="icon-btn" data-action="toggle-theme" title="' + (isDark ? 'Switch to light' : 'Switch to dark') + '" aria-label="Toggle theme">' + (isDark ? '&#9789;' : '&#9728;') + '</button><button class="icon-btn" data-action="open-settings" title="Backup & settings" aria-label="Settings">&#9881;</button></div></header>';
}

function renderSearchBar(){
  if(!state.showSearch) return '';
  const results = state.searchQuery ? performSearch(state.searchQuery) : [];
  let resultsHtml = '';
  if(state.searchQuery && results.length > 0){
    resultsHtml = '<div class="search-results">' + results.map(r => {
      let action = '', icon = '';
      if(r.type === 'section'){ action = 'toggle-section'; icon = '&#128196;'; }
      else if(r.type === 'note'){ action = 'open-note'; icon = '&#128221;'; }
      else if(r.type === 'entry'){ action = 'open-note'; icon = '&#128178;'; }
      else if(r.type === 'due'){ action = 'toggle-due'; icon = '&#128176;'; }
      else if(r.type === 'transaction'){ action = 'toggle-due'; icon = '&#128200;'; }
      else if(r.type === 'todo'){ action = 'todo-jump-date'; icon = '&#9989;'; }
      const amountStr = r.amount !== undefined ? '<span class="mono">' + formatMoney(r.amount, state.settings.defaultCurrency) + '</span>' : '';
      return '<div class="search-result-item" data-action="' + action + '" ' + (r.sectionId ? 'data-section-id="' + r.sectionId + '" ' : '') + (r.noteId ? 'data-note-id="' + r.noteId + '" ' : '') + (r.id ? 'data-id="' + r.id + '" ' : '') + (r.date ? 'data-date="' + r.date + '" ' : '') + '>' + icon + ' ' + highlightMatch(r.title, state.searchQuery) + '<div style="display:flex;align-items:center;gap:8px;">' + amountStr + '<span class="search-result-type">' + r.type + '</span></div></div>';
    }).join('') + '</div>';
  } else if(state.searchQuery){
    resultsHtml = '<div class="search-results"><div class="search-result-item" style="color:var(--ink-faint);">No results found</div></div>';
  }
  return '<div class="search-bar"><div class="search-inner"><span class="search-icon">&#128269;</span><input type="text" class="search-input" id="search-input" placeholder="Search entries, notes, dues..." value="' + escapeHtml(state.searchQuery) + '" autocomplete="off"><button class="search-clear" data-action="clear-search">&#10005;</button></div>' + resultsHtml + '</div>';
}

function renderBottomNav(){
  const tabs = [
    { key: 'home', label: 'Home', icon: '&#127968;' },
    { key: 'notes', label: 'Notes', icon: '&#128221;' },
    { key: 'dues', label: 'Dues', icon: '&#128176;' },
    { key: 'todos', label: 'Todos', icon: '&#9989;' }
  ];
  return '<nav class="bottom-nav">' + tabs.map(t => '<button class="bottom-nav-item ' + (state.tab === t.key ? 'active' : '') + '" data-action="set-tab" data-tab="' + t.key + '"><span class="nav-icon">' + t.icon + '</span><span>' + t.label + '</span></button>').join('') + '</nav>';
}

function renderQuickAdd(){
  if(state.tab !== 'home' || state.openNote) return '';
  const sections = state.sections;
  if(sections.length === 0) return '';
  let options = '';
  sections.forEach(s => {
    s.notes.forEach(n => {
      options += '<option value="' + s.id + ':' + n.id + '">' + escapeHtml(s.name) + ' / ' + escapeHtml(n.title) + '</option>';
    });
  });
  if(!options) return '';
  return '<div class="quick-add-bar"><div class="quick-add-title">Quick Add</div><form class="quick-add-form" data-form="quick-add"><input name="quick-entry" type="text" autocomplete="off" placeholder="150 Groceries" id="quick-add-input"><select name="quick-target">' + options + '</select><button type="submit" class="btn-primary small">Add</button></form><div id="quick-add-preview" class="quick-add-preview"></div></div>';
}

function renderInsights(){
  const insights = getInsights();
  if(!insights.topCategory && insights.untaggedCount === 0) return '';
  let rows = '';
  if(insights.vsLastMonth != 0){
    const isMore = parseFloat(insights.vsLastMonth) > 0;
    rows += '<div class="insight-row"><span class="insight-icon">' + (isMore ? '&#128293;' : '&#127881;') + '</span><span class="insight-text">' + (isMore ? 'Spending ' + insights.vsLastMonth + '% more than last month' : 'Spending ' + Math.abs(insights.vsLastMonth) + '% less than last month') + '</span><span class="insight-value ' + (isMore ? 'insight-negative' : 'insight-positive') + '">' + (isMore ? '+' : '') + insights.vsLastMonth + '%</span></div>';
  }
  if(insights.topCategory){
    rows += '<div class="insight-row"><span class="insight-icon">&#128176;</span><span class="insight-text">Top expense: ' + escapeHtml(insights.topCategory.desc) + '</span><span class="insight-value insight-neutral">' + formatMoney(insights.topCategory.amount, state.settings.defaultCurrency) + '</span></div>';
  }
  if(insights.untaggedCount > 0){
    rows += '<div class="insight-row"><span class="insight-icon">&#127991;</span><span class="insight-text">' + insights.untaggedCount + ' untagged entries</span><span class="insight-value insight-neutral">Tag them</span></div>';
  }
  return '<div class="card insights-card">' + rows + '</div>';
}

function renderCalendar(){
  if(!state.showCalendar) return '';
  const year = state.calendarMonth.getFullYear();
  const month = state.calendarMonth.getMonth();
  const days = getCalendarData(year, month);
  const monthName = state.calendarMonth.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

  let gridHtml = '';
  days.forEach(d => {
    if(d === null){
      gridHtml += '<div class="calendar-day empty"></div>';
    } else {
      gridHtml += '<div class="calendar-day level-' + d.level + (d.isToday ? ' today' : '') + '" data-action="calendar-select" data-date="' + d.dateStr + '" title="' + formatMoney(d.spend, state.settings.defaultCurrency) + '">' + d.day + '</div>';
    }
  });

  return '<div class="card" style="margin-bottom:16px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><button class="icon-btn" data-action="calendar-prev">&#8249;</button><span style="font-weight:600;">' + monthName + '</span><button class="icon-btn" data-action="calendar-next">&#8250;</button></div><div class="calendar-day-labels"><div class="calendar-day-label">S</div><div class="calendar-day-label">M</div><div class="calendar-day-label">T</div><div class="calendar-day-label">W</div><div class="calendar-day-label">T</div><div class="calendar-day-label">F</div><div class="calendar-day-label">S</div></div><div class="calendar-heatmap">' + gridHtml + '</div><div class="calendar-legend"><span>Less</span><div class="calendar-legend-dot" style="background:var(--line)"></div><div class="calendar-legend-dot" style="background:var(--sage-soft)"></div><div class="calendar-legend-dot" style="background:var(--sage)"></div><div class="calendar-legend-dot" style="background:var(--periwinkle)"></div><div class="calendar-legend-dot" style="background:var(--coral)"></div><span>More</span></div><div style="text-align:center;margin-top:8px;"><button class="link-back" data-action="toggle-calendar">Close calendar</button></div></div>';
}

function renderHome(){
  const sym = state.settings.defaultCurrency;
  const totalNotes = state.sections.reduce((s,sec) => s + sec.notes.length, 0);
  const totalBudget = state.sections.reduce((s,sec) => s + (Number(sec.totalBudget)||0), 0);
  const totalSpent = allEntriesFlat().reduce((s,e) => s + e.amount, 0);
  const utilized = totalBudget > 0 ? Math.round((totalSpent/totalBudget)*100) : 0;
  const totalSavings = state.sections.reduce((s,sec) => s + sectionSavings(sec), 0);

  const statsCard = '<div class="card"><div class="stats-row"><div class="stat-col"><span class="stat-label">Notes</span><span class="stat-value counter-anim">' + totalNotes + '</span></div><div class="stat-col"><span class="stat-label">Budget</span><span class="stat-value counter-anim">' + formatMoney(totalBudget, sym) + '</span></div><div class="stat-col"><span class="stat-label">Spent</span><span class="stat-value counter-anim">' + formatMoney(totalSpent, sym) + '</span></div><div class="stat-col"><span class="stat-label">Utilized</span><span class="stat-value counter-anim">' + utilized + '%</span></div></div><div class="stats-divider"></div><div class="savings-row"><span class="savings-label">Total savings</span><span class="savings-value counter-anim">' + formatMoney(totalSavings, sym) + '</span></div></div>';

  const todayEntries = entriesOnDate(todayStr());
  const todayTotal = todayEntries.reduce((s,e) => s + e.amount, 0);
  let todayCard;
  if(todayEntries.length === 0){
    todayCard = '<div class="card leading-card"><h3 class="leading-title">Today\'s expenses</h3><p class="leading-sub" style="margin-bottom:0;">' + new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}) + ' &mdash; nothing logged yet.</p></div>';
  } else {
    const sorted = todayEntries.slice().sort((a,b) => b.amount - a.amount);
    todayCard = '<div class="card leading-card"><h3 class="leading-title">Today\'s expenses</h3><p class="leading-sub">' + new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}) + '</p>' + sorted.map(e => '<div class="today-row"><span class="today-desc">' + escapeHtml(e.desc) + '</span><span class="today-note">' + escapeHtml(e.noteName) + '</span><span class="mono">' + formatMoney(e.amount, sym) + '</span></div>').join('') + '<div class="today-total-row"><span>Total today</span><span class="mono">' + formatMoney(todayTotal, sym) + '</span></div></div>';
  }

  const groups = groupEntries(allEntriesFlat());
  const top12 = groups.slice(0,12);
  let leadingCard;
  if(top12.length === 0){
    leadingCard = '<div class="card leading-card">' + emptyState('No expenses yet', 'Once you log a few entries in your notes, your biggest expenses will show up here.', null, null) + '</div>';
  } else {
    const max = Math.max(...top12.map(g => g.amount));
    const legend = { essential:0, discretionary:0, untagged:0 };
    top12.forEach(g => { legend[g.tag] = (legend[g.tag]||0) + g.amount; });
    leadingCard = '<div class="card leading-card"><h3 class="leading-title">Leading expenses</h3><p class="leading-sub">Items that cost you the most</p><div class="rank-list">' + top12.map((g,i) => '<div class="rank-row"><span class="rank-num">' + (i+1) + '.</span><span class="rank-desc">' + escapeHtml(g.desc) + '</span><span class="rank-bar"><span class="rank-bar-fill" style="width:' + Math.max(6, Math.round(g.amount/max*100)) + '%"></span></span><span class="rank-amount mono">' + formatMoney(g.amount, sym) + '</span></div>').join('') + '</div><div class="legend-row"><span class="legend-item"><span class="legend-dot dot-essential"></span>Essential: ' + formatMoney(legend.essential, sym) + '</span><span class="legend-item"><span class="legend-dot dot-discretionary"></span>Discretionary: ' + formatMoney(legend.discretionary, sym) + '</span><span class="legend-item"><span class="legend-dot dot-untagged"></span>Untagged: ' + formatMoney(legend.untagged, sym) + '</span></div></div>';
  }

  const periods = [
    { key:'7d', label:'7 days' },
    { key:'30d', label:'30 days' },
    { key:'90d', label:'3 months' },
    { key:'365d', label:'1 year' },
  ];
  const periodDays = { '7d':7,'30d':30,'90d':90,'365d':365 };
  const days = periodDays[state.historyPeriod] || 7;
  const dayGroups = entriesByDay(days);
  const historyTotal = dayGroups.reduce((s,dg) => s + dg.entries.reduce((s2,e) => s2+e.amount, 0), 0);

  let historyBody;
  if(dayGroups.length === 0){
    historyBody = '<p class="ink-faint" style="font-size:13px;margin:0;">No entries in this period.</p>';
  } else {
    historyBody = dayGroups.map(dg => {
      const dayTotal = dg.entries.reduce((s,e) => s+e.amount, 0);
      const sorted = dg.entries.slice().sort((a,b) => b.amount - a.amount);
      return '<div class="history-day"><div class="history-day-label">' + formatDate(dg.dateStr + 'T00:00:00') + ' &mdash; <span class="mono">' + formatMoney(dayTotal, sym) + '</span></div>' + sorted.map(e => '<div class="history-entry-row"><span>' + escapeHtml(e.desc) + '</span><span class="history-note-chip">' + escapeHtml(e.noteName) + '</span><span class="mono">' + formatMoney(e.amount, sym) + '</span></div>').join('') + '</div>';
    }).join('');
  }

  const historyCard = '<div class="card leading-card"><h3 class="leading-title">History</h3><p class="leading-sub">All entries &mdash; ' + formatMoney(historyTotal, sym) + ' total &middot; <button class="link-back" data-action="toggle-calendar">' + (state.showCalendar ? 'Hide' : 'Show') + ' calendar</button></p><div class="history-tabs">' + periods.map(p => '<button class="history-tab ' + (state.historyPeriod===p.key?'active':'') + '" data-action="set-history-period" data-period="' + p.key + '">' + p.label + '</button>').join('') + '</div>' + historyBody + '</div>';

  return '<div class="view">' + renderQuickAdd() + renderInsights() + statsCard + todayCard + renderCalendar() + leadingCard + historyCard + '</div>';
}

function noteRow(section, note){
  const spent = noteSpent(note);
  const pct = note.budget > 0 ? (spent/note.budget*100) : 0;
  const clamped = Math.min(100, Math.max(0, pct));
  const status = pct > 100 ? 'coral' : (pct >= 70 ? 'amber' : 'sage');
  return '<div class="note-row" data-action="open-note" data-section-id="' + section.id + '" data-note-id="' + note.id + '" role="button" tabindex="0"><div class="note-row-top"><span class="note-row-title">' + (note.icon ? escapeHtml(note.icon)+' ' : '') + escapeHtml(note.title) + '</span><span class="note-row-amount">' + formatMoney(spent, section.currency) + ' / ' + formatMoney(note.budget, section.currency) + '</span></div><div class="bar bar-' + status + ' note-row-bar"><div class="bar-fill" style="width:' + clamped + '%"></div></div></div>';
}

function sectionCard(section){
  const expanded = !!state.expandedSectionIds[section.id];
  const allocated = sectionAllocated(section);
  const spent = sectionSpent(section);
  const savings = sectionSavings(section);
  const pct = section.totalBudget > 0 ? (spent/section.totalBudget*100) : 0;
  const clamped = Math.min(100, Math.max(0, pct));
  const status = pct > 100 ? 'coral' : (pct >= 70 ? 'amber' : 'sage');
  const isConfirm = state.confirmDeleteSection === section.id;

  // Burn rate
  const burn = getBurnRate(section);
  const burnHtml = '<div class="burn-rate"><span style="white-space:nowrap;">Burn rate</span><div class="burn-rate-bar"><div class="burn-rate-fill ' + burn.status + '" style="width:' + Math.min(100, (burn.actualSpend / Math.max(1, section.totalBudget) * 100)) + '%"></div></div><span style="white-space:nowrap;">' + (burn.status === 'on-track' ? 'On track' : burn.status === 'over' ? 'Over pace' : 'Under pace') + '</span></div>';

  // Savings goal
  const goal = state.savingsGoals[section.id];
  let goalHtml = '';
  if(goal && goal.target > 0){
    const goalPct = Math.min(100, (savings / goal.target) * 100);
    goalHtml = '<div class="goal-card"><div class="goal-header"><h4 class="goal-title">' + escapeHtml(goal.label) + '</h4><span class="goal-amount">' + formatMoney(savings, section.currency) + ' / ' + formatMoney(goal.target, section.currency) + '</span></div><div class="goal-bar-bg"><div class="goal-bar-fill" style="width:' + goalPct + '%"></div></div><div class="goal-stats"><span>' + Math.round(goalPct) + '% saved</span><span>' + formatMoney(Math.max(0, goal.target - savings), section.currency) + ' to go</span></div></div>';
  }

  return '<div class="card section-card"><div class="section-top" data-action="toggle-section" data-id="' + section.id + '" role="button" tabindex="0"><div class="section-name-row"><h3 class="section-name">' + escapeHtml(section.name) + '</h3><span class="duration-badge">' + escapeHtml(section.duration) + '</span></div><div class="section-actions"><button class="icon-btn ghost" data-action="ask-edit-section" data-id="' + section.id + '" title="Edit section" aria-label="Edit section">Edit</button><button class="icon-btn ghost ' + (isConfirm?'danger':'') + '" data-action="' + (isConfirm?'confirm-delete-section':'ask-delete-section') + '" data-id="' + section.id + '" title="Delete section" aria-label="Delete section">' + (isConfirm?'Delete?':'&#10005;') + '</button><span class="chevron ' + (expanded?'open':'') + '">&#9656;</span></div></div><div class="section-stats"><span>Budget <b class="mono">' + formatMoney(section.totalBudget, section.currency) + '</b></span><span>Spent <b class="mono">' + formatMoney(spent, section.currency) + '</b></span><span>Savings <b class="mono">' + formatMoney(savings, section.currency) + '</b></span><span class="ink-faint">' + section.notes.length + ' ' + (section.notes.length===1?'note':'notes') + '</span></div><div class="bar bar-' + status + '"><div class="bar-fill" style="width:' + clamped + '%"></div></div>' + burnHtml + (expanded ? '<div class="section-expand">' + (section.notes.length === 0 ? '<p class="ink-faint" style="font-size:13px;margin:4px 0 8px;">No notes in this section yet.</p>' : section.notes.map(n => noteRow(section, n)).join('')) + '<button class="btn-secondary small" data-action="open-new-note-for" data-section-id="' + section.id + '" style="align-self:flex-start;">+ Add note</button></div>' : '') + goalHtml + '</div>';
}

function renderSectionsList(){
  return '<div class="view"><div class="view-head"><h2>Your sections</h2><button class="btn-primary" data-action="open-new-section">+ New section</button></div>' + (state.sections.length===0 ? emptyState('No sections yet', 'A section is a budgeting period - weekly, monthly, or yearly. Create one, then add notes like Groceries or Fuel inside it.', '+ New section', 'open-new-section') : '<div class="section-list">' + state.sections.map(sectionCard).join('') + '</div>') + '</div>';
}

function bi_row(g, note, section){
  const pct = note.budget > 0 ? Math.round(g.amount/note.budget*100) : 0;
  return '<div class="bi-row"><span class="mono">' + formatMoney(g.amount, section.currency) + '</span><span>' + escapeHtml(g.desc) + (g.count>1?' <span class="ink-faint">(x' + g.count + ')</span>':'') + '</span><span class="bi-pct">' + pct + '%</span></div>';
}

function entryRow(entry, section, note){
  const isConfirm = state.confirmDeleteEntry === entry.id;
  const tagClass = entry.tag === 'essential' ? 'tag-essential' : entry.tag === 'discretionary' ? 'tag-discretionary' : '';
  const tagTitle = entry.tag === 'essential' ? 'Essential - click to change' : entry.tag === 'discretionary' ? 'Discretionary - click to change' : 'Untagged - click to tag';
  return '<div class="ledger-row"><button class="tag-btn ' + tagClass + '" data-action="cycle-tag" data-section-id="' + section.id + '" data-note-id="' + note.id + '" data-entry-id="' + entry.id + '" title="' + tagTitle + '" aria-label="' + tagTitle + '"></button><span class="mono amount">' + formatMoney(entry.amount, section.currency) + '</span><span class="desc">' + escapeHtml(entry.desc) + '</span><span class="ink-faint date">' + formatDate(entry.date) + '</span><button class="icon-btn ghost ' + (isConfirm?'danger':'') + '" data-action="' + (isConfirm?'confirm-delete-entry':'ask-delete-entry') + '" data-section-id="' + section.id + '" data-note-id="' + note.id + '" data-entry-id="' + entry.id + '" aria-label="Delete entry">' + (isConfirm?'Confirm':'&#10005;') + '</button></div>';
}

function renderNoteDetail(section, note){
  const spent = noteSpent(note);
  const remaining = note.budget - spent;
  const pct = note.budget > 0 ? (spent/note.budget*100) : 0;
  const clamped = Math.min(100, Math.max(0, pct));
  const status = pct > 100 ? 'coral' : (pct >= 70 ? 'amber' : 'sage');
  const groups = groupEntries(note.entries);
  const availableToAllocate = sectionSavings(section);
  const templates = getTemplatesForNote(section.id, note.id);

  let templatesHtml = '';
  if(templates.length > 0){
    templatesHtml = '<div class="template-chips">' + templates.slice().reverse().map(t => '<button class="template-chip" data-action="use-template" data-section-id="' + section.id + '" data-note-id="' + note.id + '" data-desc="' + escapeHtml(t.desc) + '" data-amount="' + t.amount + '"><span>' + escapeHtml(t.desc) + '</span><span class="chip-amount">' + formatMoney(t.amount, section.currency) + '</span></button>').join('') + '</div>';
  }

  return '<div class="view"><button class="link-back" data-action="back-to-sections">&larr; ' + escapeHtml(section.name) + '</button><div class="detail-head"><h2 class="note-title-lg">' + (note.icon ? escapeHtml(note.icon)+' ' : '') + escapeHtml(note.title) + '</h2><div class="budget-edit"><label for="note-budget-input">Budget</label><input id="note-budget-input" class="budget-input-inline" type="number" min="0" step="0.01" value="' + note.budget + '" data-section-id="' + section.id + '" data-note-id="' + note.id + '" /></div></div><div class="bar bar-' + status + ' bar-lg"><div class="bar-fill" style="width:' + clamped + '%"></div></div><div class="detail-stats"><span class="mono">' + formatMoney(spent, section.currency) + ' spent</span><span class="ink-faint">&middot;</span><span class="mono ' + (remaining<0?'text-coral':'ink-soft') + '">' + (remaining<0 ? formatMoney(Math.abs(remaining), section.currency)+' over' : formatMoney(remaining, section.currency)+' left') + '</span></div><div class="allocate-hint">' + formatMoney(availableToAllocate, section.currency) + ' still available to allocate in ' + escapeHtml(section.name) + '</div>' + templatesHtml + (groups.length > 0 ? '<div class="card budget-items-card"><div class="bi-head"><span class="bi-title">Budget items (' + groups.length + ')</span></div>' + groups.map(g => bi_row(g, note, section)).join('') + '</div>' : '') + '<form class="entry-form" data-form="entry" data-section-id="' + section.id + '" data-note-id="' + note.id + '"><input id="entry-input" name="entry" type="text" autocomplete="off" placeholder="150 Groceries" /><button type="submit" class="btn-primary small">Add</button></form><div id="entry-preview" class="entry-preview"></div>' + (state.entryError ? '<div class="form-error">' + escapeHtml(state.entryError) + '</div>' : '') + '<div style="margin-bottom:10px;"><button class="btn-secondary small" data-action="toggle-bulk-entry">' + (state.showBulkEntry ? 'Hide' : 'Bulk') + ' entry</button></div>' function todoRow(t, opts){

function renderTodosView(){
  const today = todayStr();
  const viewDate = state.todoDate || today;
  const isToday = viewDate === today;
  let dayTodos = state.todos.filter(t => t.date === viewDate);
  dayTodos = dayTodos.slice().sort((a,b) => (a.done?1:0) - (b.done?1:0));
  const carriedOver = isToday ? state.todos.filter(t => t.date < viewDate && !t.done) : [];
  const totalForProgress = dayTodos.length + carriedOver.length;
  const doneCount = dayTodos.filter(t => t.done).length;
  const pct = totalForProgress > 0 ? Math.round(doneCount/totalForProgress*100) : 0;

  return '<div class="view"><div class="todo-nav"><button class="icon-btn" data-action="todo-prev-day" aria-label="Previous day">&#8249;</button><span class="todo-date-main">' + formatTodoDateLabel(viewDate) + '</span><button class="icon-btn" data-action="todo-next-day" aria-label="Next day">&#8250;</button></div>' + (!isToday ? '<button class="link-back" data-action="todo-jump-today" style="display:block;margin:0 auto 14px;">&larr; Back to today</button>' : '') + (totalForProgress > 0 ? '<div class="bar bar-sage"><div class="bar-fill" style="width:' + pct + '%"></div></div><div class="todo-progress-label">' + doneCount + ' of ' + totalForProgress + ' done</div>' : '') + '<form class="entry-form" data-form="todo" data-date="' + viewDate + '"><input id="todo-input" name="todo" type="text" autocomplete="off" placeholder="' + (isToday ? 'What do you need to do today?' : 'Add a task for this day') + '" /><button type="submit" class="btn-primary small">Add</button></form>' + (carriedOver.length > 0 ? '<div class="todo-section-label">Carried over</div><div class="todo-list">' + carriedOver.map(t => todoRow(t, {showDate:true})).join('') + '</div>' : '') + (dayTodos.length > 0 ? (carriedOver.length > 0 ? '<div class="todo-section-label">' + (isToday ? 'Today' : 'This day') + '</div>' : '') + '<div class="todo-list">' + dayTodos.map(t => todoRow(t, {showDate:false})).join('') + '</div>' : (carriedOver.length === 0 ? emptyState(isToday ? 'Nothing on your list' : 'No tasks for this day', isToday ? 'Add something below to get started.' : 'Tasks you add here will only show up on this day.', null, null) : '')) + '</div>';
}

function attachLivePreview(){
  const input = document.getElementById('entry-input');
  const preview = document.getElementById('entry-preview');
  if(!input || !preview || !state.openNote) return;
  const section = findSection(state.openNote.sectionId);
  const update = () => {
    const v = input.value.trim();
    const match = v.match(/^(-?[\d,]+(?:\.\d{1,2})?)\s+(.+)$/);
    if(match && section){
      preview.textContent = formatMoney(parseFloat(match[1].replace(/,/g,'')), section.currency) + ' -> ' + match[2].trim();
      preview.className = 'entry-preview valid';
    } else if(v){
      preview.textContent = 'Start with a number, like "150 Groceries"';
      preview.className = 'entry-preview hint';
    } else {
      preview.textContent = '';
      preview.className = 'entry-preview';
    }
  };
  input.addEventListener('input', update);
  update();
}
