function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = '<div class="loading">Loading your notes...</div>';
    return;
  }
  let html = renderHeader();
  html += renderSearchBar();
  html += '<nav class="tabs" role="tablist"><button class="tab ' + (state.tab==='home'?'active':'') + '" data-action="set-tab" data-tab="home">Home</button><button class="tab ' + (state.tab==='notes'?'active':'') + '" data-action="set-tab" data-tab="notes">Notes</button><button class="tab ' + (state.tab==='dues'?'active':'') + '" data-action="set-tab" data-tab="dues">Dues</button><button class="tab ' + (state.tab==='todos'?'active':'') + '" data-action="set-tab" data-tab="todos">Todos</button></nav>';
  html += '<main class="main">';
  if(state.migrationNotice){
    html += '<div class="toast-info">' + escapeHtml(state.migrationNotice) + '</div>';
  }
  if(state.tab === 'home'){
    html += renderHome();
  } else if(state.tab === 'notes'){
    if(state.openNote){
      const section = findSection(state.openNote.sectionId);
      const note = section ? findNote(section.id, state.openNote.noteId) : null;
      html += (section && note) ? renderNoteDetail(section, note) : renderSectionsList();
    } else {
      html += renderSectionsList();
    }
  } else if(state.tab === 'dues'){
    html += renderDuesView();
  } else if(state.tab === 'todos'){
    html += renderTodosView();
  }
  if(state.error){
    html += '<div class="toast-error">' + escapeHtml(state.error) + '</div>';
  }
  html += '</main>';
  html += renderBottomNav();
  if(state.showNewSection) html += sectionModal();
  if(state.showNewNoteFor) html += noteModal();
  if(state.showNewDue) html += newDueModal();
  if(state.showAddTxFor) html += addTransactionModal();
  if(state.editLenderId) html += editLenderModal();
  if(state.showSettings) html += settingsModal();
  app.innerHTML = html;

  if(pendingFocus){
    const el = document.getElementById(pendingFocus);
    if(el) el.focus();
    pendingFocus = null;
  }
  attachLivePreview();
  attachQuickAddPreview();
}


function closeAllModals(){
  state.showNewSection = false; state.editSectionId = null; state.sectionCopyFromId = 'scratch';
  state.showNewNoteFor = null; state.showNewDue = false; state.showSettings = false;
  state.showAddTxFor = null; state.editLenderId = null; state.transactionError = null;
  state.showJoinHousehold = false; state.syncError = null;
  state.showBulkEntry = false;
  state.showNewBill = false; state.editBillId = null;
  state.billPayModal = null; state.billHistoryModal = null;
}

function init(){
  const app = document.getElementById('app');

  app.addEventListener('click', (e) => {
    if(e.target.classList && e.target.classList.contains('overlay')){
      closeAllModals();
      render();
      return;
    }
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    const id = el.dataset.id;
    const sectionId = el.dataset.sectionId;
    const noteId = el.dataset.noteId;
    const entryId = el.dataset.entryId;
    const dueId = el.dataset.dueId;
    const txId = el.dataset.txId;

    switch(action){
      case 'set-tab':
        state.tab = el.dataset.tab; state.showSearch = false; state.searchQuery = ''; render(); break;
      case 'set-history-period':
        state.historyPeriod = el.dataset.period; render(); break;
      case 'open-new-section':
        closeAllModals(); state.showNewSection = true; render(); break;
      case 'ask-edit-section':
        closeAllModals(); state.editSectionId = id; state.showNewSection = true; render(); break;
      case 'open-new-note-for':
        closeAllModals(); state.showNewNoteFor = sectionId; render(); break;
      case 'open-new-due':
        closeAllModals(); state.showNewDue = true; render(); break;
      case 'open-settings':
        closeAllModals(); state.showSettings = true; state.importError = null; render(); break;
      case 'toggle-theme':
        toggleTheme(); break;
      case 'close-modal':
        closeAllModals();
        render(); break;
      case 'toggle-section':
        state.expandedSectionIds[id] = !state.expandedSectionIds[id]; render(); break;
      case 'ask-delete-section':
        state.confirmDeleteSection = id; render(); break;
      case 'confirm-delete-section':
        deleteSection(id); break;
      case 'open-note':
        state.openNote = { sectionId, noteId }; state.entryError = null; render(); break;
      case 'back-to-sections':
        state.openNote = null; render(); break;
      case 'ask-delete-note':
        state.confirmDeleteNote = sectionId + ':' + noteId; render(); break;
      case 'confirm-delete-note':
        deleteNote(sectionId, noteId); break;
      case 'ask-delete-entry':
        state.confirmDeleteEntry = entryId; render(); break;
      case 'confirm-delete-entry':
        deleteEntry(sectionId, noteId, entryId); break;
      case 'cycle-tag':
        cycleTag(sectionId, noteId, entryId); break;
      case 'set-dues-tab':
        state.duesTab = el.dataset.duestab; render(); break;
      case 'toggle-due':
        state.expandedDueId = state.expandedDueId === id ? null : id; render(); break;
      case 'open-edit-lender':
        closeAllModals(); state.editLenderId = id; render(); break;
      case 'open-add-tx':
        closeAllModals(); state.showAddTxFor = id; render(); break;
      case 'ask-delete-tx':
        state.confirmDeleteTx = txId; render(); break;
      case 'confirm-delete-tx':
        deleteTransaction(dueId, txId); break;
      case 'share-due':
        shareRecords(id); break;
      case 'share-whatsapp':
        shareWhatsApp(id); break;
      case 'ask-delete-due':
        state.confirmDeleteDue = id; render(); break;
      case 'confirm-delete-due':
        deleteDue(id); break;
      case 'toggle-todo':
        toggleTodo(id); break;
      case 'ask-delete-todo':
        state.confirmDeleteTodo = id; render(); break;
      case 'confirm-delete-todo':
        deleteTodo(id); break;
      case 'todo-prev-day':
        state.todoDate = shiftDateStr(state.todoDate || todayStr(), -1); render(); break;
      case 'todo-next-day':
        state.todoDate = shiftDateStr(state.todoDate || todayStr(), 1); render(); break;
      case 'todo-jump-today':
        state.todoDate = todayStr(); render(); break;
      case 'todo-jump-date':
        state.todoDate = el.dataset.date || todayStr(); state.tab = 'todos'; state.showSearch = false; render(); break;
      case 'export-data':
        exportData(); break;
      case 'export-csv':
        exportCSV(); break;
      case 'trigger-import': {
        const f = document.getElementById('import-file');
        if(f) f.click();
        break;
      }
      case 'start-create-household':
        createHousehold(); break;
      case 'open-join-household':
        state.showJoinHousehold = true; state.syncError = null; render(); break;
      case 'cancel-join-household':
        state.showJoinHousehold = false; state.syncError = null; render(); break;
      case 'stop-syncing':
        stopSyncing(); break;
      case 'copy-household-code': {
        const code = state.settings.householdId;
        if(code && navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(code).then(() => {
            el.textContent = 'Copied!';
            setTimeout(() => { el.textContent = 'Copy'; }, 1500);
          }).catch(() => {});
        }
        break;
      }
      case 'toggle-search':
        state.showSearch = !state.showSearch;
        state.searchQuery = '';
        render();
        if(state.showSearch) pendingFocus = 'search-input';
        break;
      case 'clear-search':
        state.searchQuery = '';
        render();
        pendingFocus = 'search-input';
        break;
      case 'toggle-calendar':
        state.showCalendar = !state.showCalendar;
        render();
        break;
      case 'calendar-prev':
        state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() - 1, 1);
        render();
        break;
      case 'calendar-next':
        state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() + 1, 1);
        render();
        break;
      case 'calendar-select':
        state.historyPeriod = '30d';
        state.showCalendar = false;
        render();
        break;
      case 'toggle-bulk-entry':
        state.showBulkEntry = !state.showBulkEntry;
        render();
        break;
      case 'submit-bulk': {
        const ta = document.getElementById('bulk-textarea');
        if(ta) processBulkEntry(el.dataset.sectionId, el.dataset.noteId, ta.value);
        break;
      }
      case 'use-template': {
        const sId = el.dataset.sectionId;
        const nId = el.dataset.noteId;
        const desc = el.dataset.desc;
        const amount = parseFloat(el.dataset.amount);
        const note = findNote(sId, nId);
        if(note){
          note.entries.unshift({ id: uid(), amount, desc, date: new Date().toISOString(), tag: null });
          hapticSuccess();
          render();
          saveData();
        }
        break;
      }
      case 'set-bills-filter':
        state.billsFilter = el.dataset.filter; render(); break;
      case 'open-new-bill':
        closeAllModals(); state.showNewBill = true; render(); break;
      case 'open-edit-bill':
        closeAllModals(); state.editBillId = id; render(); break;
      case 'open-pay-bill':
        closeAllModals(); state.billPayModal = id; render(); break;
      case 'open-bill-history':
        closeAllModals(); state.billHistoryModal = id; render(); break;
      case 'toggle-bill':
        state.expandedDueId = state.expandedDueId === id ? null : id; render(); break;
      case 'ask-delete-bill':
        state.confirmDeleteBill = id; render(); break;
      case 'confirm-delete-bill':
        deleteBill(id); break;
      case 'skip-bill':
        skipBillPeriod(id); break;
      case 'delete-bill-payment':
        deleteBillPayment(el.dataset.billId, el.dataset.paymentId); break;
      default: break;
    }
  });

  app.addEventListener('keydown', (e) => {
    if((e.key === 'Enter' || e.key === ' ') && e.target.matches('[data-action][role="button"]')){
      e.preventDefault();
      e.target.click();
    }
    // Keyboard shortcuts
    if(e.ctrlKey || e.metaKey){
      if(e.key === 'k'){ e.preventDefault(); state.showSearch = true; state.searchQuery = ''; render(); pendingFocus = 'search-input'; }
      if(e.key === 'n'){ e.preventDefault(); if(state.tab === 'notes' && state.openNote){ pendingFocus = 'entry-input'; render(); } }
      if(e.key === '.'){ e.preventDefault(); toggleTheme(); }
    }
    if(e.key === 'Escape'){
      if(state.showSearch){ state.showSearch = false; state.searchQuery = ''; render(); }
      else if(state.showNewSection || state.showNewNoteFor || state.showNewDue || state.showSettings || state.showAddTxFor || state.editLenderId){ closeAllModals(); render(); }
      else if(state.openNote){ state.openNote = null; render(); }
    }
  });

  app.addEventListener('submit', (e) => {
    e.preventDefault();
    const form = e.target;
    if(form.dataset.form === 'section'){
      let currency = form.elements['currency'].value;
      if(currency === 'custom') currency = form.elements['customCurrency'].value || 'Rs ';
      const payload = { name: form.elements['name'].value, totalBudget: form.elements['totalBudget'].value, duration: form.elements['duration'].value, currency };
      if(form.dataset.editId){ updateSection(form.dataset.editId, payload); }
      else {
        const copyFromEl = form.elements['copyFrom'];
        const copyFromId = (copyFromEl && copyFromEl.value !== 'scratch') ? copyFromEl.value : null;
        createSection(Object.assign({}, payload, { copyFromId }));
        // Set savings goal if provided
        const goalVal = form.elements['savingsGoal'] ? parseFloat(form.elements['savingsGoal'].value) : 0;
        const goalLabel = form.elements['goalLabel'] ? form.elements['goalLabel'].value : '';
        if(goalVal > 0){
          const newSection = state.sections[0];
          if(newSection) setSavingsGoal(newSection.id, goalVal, goalLabel);
        }
      }
    } else if(form.dataset.form === 'note'){
      createNoteInSection(form.dataset.sectionId, {
        title: form.elements['title'].value,
        icon: form.elements['icon'].value,
        budget: form.elements['budget'].value
      });
    } else if(form.dataset.form === 'entry'){
      addEntry(form.dataset.sectionId, form.dataset.noteId, form.elements['entry'].value);
    } else if(form.dataset.form === 'new-due'){
      createLender({
        type: form.elements['type'].value,
        person: form.elements['person'].value,
        dueDate: form.elements['dueDate'] ? form.elements['dueDate'].value : null
      });
    } else if(form.dataset.form === 'transaction'){
      const sign = e.submitter ? e.submitter.dataset.sign : null;
      const dateVal = form.elements['transaction-date'] ? form.elements['transaction-date'].value : '';
      addTransaction(form.dataset.dueId, form.elements['transaction'].value, sign, dateVal);
    } else if(form.dataset.form === 'rename-lender'){
      renameLender(form.dataset.dueId, form.elements['person'].value);
    } else if(form.dataset.form === 'todo'){
      addTodo(form.dataset.date, form.elements['todo'].value);
    } else if(form.dataset.form === 'join-household'){
      joinHousehold(form.elements['code'].value);
    } else if(form.dataset.form === 'bill'){
      const editId = form.dataset.editId;
      const recurrence = form.elements['recurrence'].value;
      const payload = {
        name: form.elements['name'].value,
        category: form.elements['category'].value,
        amount: form.elements['amount'].value,
        dueDate: form.elements['dueDate'].value,
        recurrence: recurrence,
        customDays: recurrence === 'custom' ? form.elements['customDays'].value : 30,
        notes: form.elements['notes'].value,
        variableAmount: form.elements['variableAmount'] && form.elements['variableAmount'].checked,
        autoEstimate: form.elements['autoEstimate'] && form.elements['autoEstimate'].checked
      };
      if(editId){
        updateBill(editId, payload);
      } else {
        createBill(payload);
      }
    } else if(form.dataset.form === 'pay-bill'){
      payBill(form.dataset.billId, form.elements['amount'].value, form.elements['date'].value, form.elements['note'].value);
    }
    } else if(form.dataset.form === 'quick-add'){
      const target = form.elements['quick-target'].value;
      const parts = target.split(':');
      if(parts.length === 2 && quickAdd(form.elements['quick-entry'].value, parts[0], parts[1])){
        form.elements['quick-entry'].value = '';
        document.getElementById('quick-add-preview').textContent = '';
      }
    }
  });

  app.addEventListener('change', (e) => {
    if(e.target.id === 'import-file' && e.target.files[0]){
      importData(e.target.files[0]);
    }
    if(e.target.id === 'default-currency-select'){
      state.settings.defaultCurrency = e.target.value;
      saveData();
    }
    if(e.target.id === 'note-budget-input'){
      updateNoteBudget(e.target.dataset.sectionId, e.target.dataset.noteId, e.target.value);
    }
    if(e.target.name === 'copyFrom'){
      state.sectionCopyFromId = e.target.value;
      render();
      pendingFocus = null;
      const nameInput = document.querySelector('form[data-form="section"] input[name="name"]');
      if(nameInput) nameInput.focus();
    }
        if(e.target.name === 'recurrence'){
      const form = e.target.closest('form');
      const customLabel = form && form.querySelector('#custom-days-label');
      if(customLabel) customLabel.style.display = e.target.value === 'custom' ? 'block' : 'none';
    }
    if(e.target.name === 'currency'){
      const form = e.target.closest('form');
      const customInput = form && form.querySelector('.custom-currency-input');
      if(customInput) customInput.style.display = e.target.value === 'custom' ? 'block' : 'none';
    }
    if(e.target.name === 'duration'){
      const form = e.target.closest('form');
      if(form && form.dataset.form === 'section' && !form.dataset.editId){
        const nameInput = form.elements['name'];
        if(nameInput && !nameInput.dataset.touched){
          nameInput.value = suggestSectionName(e.target.value);
        }
      }
    }
    if(e.target.name === 'name'){
      e.target.dataset.touched = 'true';
    }
  });

  // Search input handler
  app.addEventListener('input', (e) => {
    if(e.target.id === 'search-input'){
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        state.searchQuery = e.target.value;
        render();
        const input = document.getElementById('search-input');
        if(input){ input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
      }, 150);
    }
  });

  // Swipe gesture handlers
  app.addEventListener('touchstart', (e) => {
    const row = e.target.closest('.ledger-row, .todo-row, .tx-row');
    if(!row) return;
    state.swipeState = { active: true, startX: e.touches[0].clientX, currentX: e.touches[0].clientX, target: row };
  }, { passive: true });

  app.addEventListener('touchmove', (e) => {
    if(!state.swipeState.active) return;
    state.swipeState.currentX = e.touches[0].clientX;
    const diff = state.swipeState.startX - state.swipeState.currentX;
    if(diff > 0 && diff < 100){
      state.swipeState.target.style.transform = 'translateX(-' + diff + 'px)';
    }
  }, { passive: true });

  app.addEventListener('touchend', (e) => {
    if(!state.swipeState.active) return;
    const diff = state.swipeState.startX - state.swipeState.currentX;
    state.swipeState.target.style.transform = '';
    if(diff > 60){
      // Swiped left - could trigger quick actions
      haptic();
    }
    state.swipeState = { active: false, startX: 0, currentX: 0, target: null };
  });

  loadData();
}

init();
})();
</script>
</body>
</html>
