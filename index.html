   This entire app already serializes its state into one JSON blob (the same
   blob saved to localStorage), so syncing just means mirroring that blob to
   a single Firestore document and re-applying it locally when it changes
   remotely. */
const CloudSync = (function(){
  const firebaseConfig = {
    apiKey: "AIzaSyC69GXaUgBoCgPxvucP_NCUZmWzc-1k64Q",
    authDomain: "budgetnotes-61f28.firebaseapp.com",
    projectId: "budgetnotes-61f28",
    storageBucket: "budgetnotes-61f28.firebasestorage.app",
    messagingSenderId: "114411632334",
    appId: "1:114411632334:web:b44ebe5fe53327d937c29f"
  };

  let app = null, db = null, unsubscribe = null;
  let lastPushedJSON = null; // used to ignore the echo of our own writes
  let onRemoteUpdate = null; // callback set by the app: (jsonString) => void
  let onStatusChange = null; // callback: (status) => void, status in 'connecting'|'connected'|'error'|'offline'

  function available(){
    return typeof firebase !== 'undefined';
  }

  function ensureApp(){
    if(!available()) throw new Error('Firebase SDK not loaded (are you offline?)');
    if(!app){
      app = firebase.apps && firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    }
    return db;
  }

  function generateHouseholdId(){
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let out = '';
    const bytes = (window.crypto && window.crypto.getRandomValues) ? window.crypto.getRandomValues(new Uint8Array(24)) : null;
    for(let i = 0; i < 24; i++){
      const idx = bytes ? bytes[i] % chars.length : Math.floor(Math.random() * chars.length);
      out += chars[idx];
    }
    return out;
  }

  function setCallbacks({ remoteUpdate, statusChange }){
    onRemoteUpdate = remoteUpdate || null;
    onStatusChange = statusChange || null;
  }

  function start(householdId){
    stop(); // tear down any previous listener first
    if(!householdId) return;
    try{
      const database = ensureApp();
      if(onStatusChange) onStatusChange('connecting');
      const ref = database.collection('households').doc(householdId);
      unsubscribe = ref.onSnapshot(
        (snap) => {
          if(onStatusChange) onStatusChange('connected');
          if(!snap.exists) return;
          const data = snap.data();
          const json = data && data.payload;
          if(typeof json !== 'string') return;
          if(json === lastPushedJSON){
            // This is just our own write echoing back from the server -- the
            // local state is already correct, so skip re-applying it (doing
            // so would needlessly blow away in-progress local UI state).
            return;
          }
          if(onRemoteUpdate) onRemoteUpdate(json);
        },
        (err) => {
          console.warn('CloudSync listener error:', err);
          if(onStatusChange) onStatusChange('error');
        }
      );
    }catch(e){
      console.warn('CloudSync start failed:', e);
      if(onStatusChange) onStatusChange('error');
    }
  }

  function stop(){
    if(unsubscribe){ unsubscribe(); unsubscribe = null; }
    lastPushedJSON = null;
  }

  async function push(householdId, jsonString){
    if(!householdId) return;
    try{
      const database = ensureApp();
      lastPushedJSON = jsonString;
      await database.collection('households').doc(householdId).set({
        payload: jsonString,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){
      console.warn('CloudSync push failed:', e);
      if(onStatusChange) onStatusChange('error');
    }
  }

  async function fetchOnce(householdId){
    const database = ensureApp();
    const snap = await database.collection('households').doc(householdId).get();
    if(!snap.exists) return null;
    const data = snap.data();
    return (data && typeof data.payload === 'string') ? data.payload : null;
  }

  return { available, generateHouseholdId, setCallbacks, start, stop, push, fetchOnce };
})();

function uid(){ return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatMoney(amount, symbol){
  const n = Number(amount) || 0;
  const neg = n < 0;
  const abs = Math.abs(n);
  const fixed = (Math.round(abs*100)/100) % 1 === 0 ? abs.toFixed(0) : abs.toFixed(2);
  const parts = fixed.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const out = parts.join('.');
  return (neg ? '-' : '') + (symbol || '') + out;
}

function formatDate(iso){
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}

function daysBetween(iso){
  const d = new Date(iso);
  if(isNaN(d)) return 0;
  return Math.max(0, Math.floor((Date.now() - d.getTime()) / 86400000));
}

function detectSystemTheme(){
  try{
    if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
  }catch(e){}
  return 'light';
}

  const tc = document.getElementById('pwa-theme-color');
  if(tc) tc.setAttribute('content', dark ? '#19181D' : '#F3F1FA');

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function shiftDateStr(dateStr, deltaDays){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + deltaDays);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatTodoDateLabel(dateStr){
  const today = todayStr();
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(today + 'T00:00:00');
  const diffDays = Math.round((d - t) / 86400000);
  const monthDay = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  if(diffDays === 0) return 'Today, ' + monthDay;
  if(diffDays === 1) return 'Tomorrow, ' + monthDay;
  if(diffDays === -1) return 'Yesterday, ' + monthDay;
  return d.toLocaleDateString(undefined, { weekday:'long' }) + ', ' + monthDay;
}

function suggestSectionName(duration){
  const now = new Date();
  if(duration === 'yearly') return String(now.getFullYear());
  if(duration === 'weekly') return 'Week of ' + now.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  return now.toLocaleDateString(undefined, { month:'long', year:'numeric' });
}

// Groups entries by description (case-insensitive), summing amounts and
// picking the majority tag. Used for "Budget Items" and "Leading Expenses".
function groupEntries(entries){
  const map = new Map();
  entries.forEach(e => {
    const key = (e.desc || '').trim().toLowerCase();
    if(!key) return;
    if(!map.has(key)){
      map.set(key, { desc: e.desc.trim(), amount: 0, count: 0, tagCounts: {} });
    }
    const g = map.get(key);
    g.amount += Number(e.amount) || 0;
    g.count += 1;
    const t = e.tag || 'untagged';
    g.tagCounts[t] = (g.tagCounts[t] || 0) + 1;
  });
  const groups = [...map.values()].map(g => {
    let bestTag = 'untagged', bestCount = -1;
    Object.keys(g.tagCounts).forEach(t => { if(g.tagCounts[t] > bestCount){ bestCount = g.tagCounts[t]; bestTag = t; } });
    return { desc: g.desc, amount: g.amount, count: g.count, tag: bestTag };
  });
  groups.sort((a,b) => b.amount - a.amount);
  return groups;
}

function migrateDue(d){
  if(Array.isArray(d.transactions)) return d;
  const transactions = [];
  if(d.amount){
    transactions.push({
      id: uid(),
      amount: -(Number(d.amount) || 0),
      desc: (d.note || '').trim() || 'Initial amount',
      comment: '',
      date: d.date ? new Date(d.date).toISOString() : (d.createdAt || new Date().toISOString())
    });
  }
  (d.payments || []).forEach(p => {
    transactions.push({ id: p.id || uid(), amount: Number(p.amount) || 0, desc: 'Paid', comment: '', date: p.date || new Date().toISOString() });
  });
  return {
    id: d.id || uid(),
    type: d.type === 'borrowed' ? 'borrowed' : 'lent',
    person: d.person || 'Unnamed',
    transactions,
    createdAt: d.createdAt || new Date().toISOString()
  };
}

function applyRemoteState(jsonString){
  try{
    const parsed = JSON.parse(jsonString);
    state.settings = parsed.settings || state.settings;
    state.sections = Array.isArray(parsed.sections) ? parsed.sections : [];
    state.dues = (parsed.dues || []).map(migrateDue);
    state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
    // Cache the synced data locally too, so a later offline open still has it.
    window.storage.set(STORAGE_KEY, jsonString, false).catch(()=>{});
    applyTheme();
    render();
  }catch(e){
    console.warn('Failed to apply remote update:', e);
  }
}

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.settings = parsed.settings || { defaultCurrency: 'Rs ' };
      if(Array.isArray(parsed.sections)){
        state.sections = parsed.sections;
      } else if(Array.isArray(parsed.notes) && parsed.notes.length){
        // Migrate the old flat-notes format (no sections) into one section.
        const migrated = {
          id: uid(),
          name: 'My Notes',
          totalBudget: parsed.notes.reduce((s,n) => s + (Number(n.budget)||0), 0),
          duration: 'monthly',
          currency: parsed.notes[0].currency || state.settings.defaultCurrency || 'Rs ',
          createdAt: new Date().toISOString(),
          notes: parsed.notes.map(n => ({
            id: n.id || uid(),
            title: n.title || 'Untitled note',
            icon: '',
            budget: Number(n.budget) || 0,
            entries: (n.entries || []).map(e => ({ id: e.id || uid(), amount: e.amount, desc: e.desc, date: e.date, tag: e.tag || null })),
            createdAt: n.createdAt || new Date().toISOString()
          }))
        };
        state.sections = [migrated];
        state.migrationNotice = 'Your earlier notes were moved into a new section called "My Notes" so nothing was lost.';
      } else {
        state.sections = [];
      }
      state.dues = (parsed.dues || []).map(migrateDue);
      state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
    }
  } catch(e){
    state.sections = [];
    state.dues = [];
    state.todos = [];
    state.settings = { defaultCurrency: 'Rs ' };
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify({ sections: [], dues: [], todos: [], settings: state.settings }), false);
    }catch(e2){ console.error('Could not initialize storage', e2); }
  }
  state.todoDate = todayStr();
  if(!state.settings.theme){
    state.settings.theme = detectSystemTheme();
  }
  applyTheme();
  if(state.sections.length){
    state.expandedSectionIds[state.sections[0].id] = true;
  }
  state.loaded = true;
  render();

  CloudSync.setCallbacks({
    remoteUpdate: applyRemoteState,
    statusChange: (status) => { state.syncStatus = status; render(); }
  });
  if(state.settings.householdId){
    state.syncStatus = 'connecting';
    CloudSync.start(state.settings.householdId);
  }
}

async function saveData(){
  const jsonString = JSON.stringify({
    sections: state.sections, dues: state.dues, todos: state.todos, settings: state.settings
  });
  try{
    const result = await window.storage.set(STORAGE_KEY, jsonString, false);
    const hadError = !!state.error;
    state.error = result ? null : 'Could not save just now. Your latest change may not persist.';
    if(hadError !== !!state.error) render();
  }catch(e){
    console.error(e);
    state.error = 'Could not save just now. Your latest change may not persist.';
    render();
  }
  if(state.settings.householdId){
    CloudSync.push(state.settings.householdId, jsonString);
  }
}

function findSection(sectionId){ return state.sections.find(s => s.id === sectionId); }
function findNote(sectionId, noteId){
  const s = findSection(sectionId);
  return s ? s.notes.find(n => n.id === noteId) : null;
}

function sectionAllocated(section){ return section.notes.reduce((s,n) => s + (Number(n.budget)||0), 0); }
function sectionSpent(section){ return section.notes.reduce((s,n) => s + n.entries.reduce((s2,e)=>s2+e.amount,0), 0); }
function sectionSavings(section){ return Math.max(0, section.totalBudget - sectionAllocated(section)); }

function noteSpent(note){ return note.entries.reduce((s,e) => s + e.amount, 0); }

function txTotals(due){
  let principal = 0, settled = 0;
  due.transactions.forEach(t => { if(t.amount < 0) principal += -t.amount; else settled += t.amount; });
  return { principal, settled, pending: principal - settled };
}

function dueTypeLabels(type){
  return type === 'lent'
    ? { negBtn:'Lent (-)', posBtn:'Received (+)', principalLabel:'Lent', settledLabel:'Received', bannerLabel:'Amount to receive' }
    : { negBtn:'Borrowed (-)', posBtn:'Repaid (+)', principalLabel:'Borrowed', settledLabel:'Paid', bannerLabel:'Amount to pay' };
}

function dueGroupTotal(type){
  return state.dues.filter(d => d.type === type).reduce((s,d) => s + Math.max(0, txTotals(d).pending), 0);
}

function createSection({name, totalBudget, duration, currency, copyFromId}){
  let copiedNotes = [];
  if(copyFromId){
    const source = findSection(copyFromId);
    if(source){
      copiedNotes = source.notes.map(n => ({
        id: uid(),
        title: n.title,
        icon: n.icon || '',
        budget: n.budget,
        entries: [],
        createdAt: new Date().toISOString()
      }));
    }
  }
  const section = {
    id: uid(),
    name: (name||'').trim() || suggestSectionName(duration),
    totalBudget: Number(totalBudget) || 0,
    duration: duration || 'monthly',
    currency: currency || state.settings.defaultCurrency || 'Rs ',
    createdAt: new Date().toISOString(),
    notes: copiedNotes
  };
  state.sections.unshift(section);
  state.expandedSectionIds[section.id] = true;
  state.showNewSection = false;
  state.sectionCopyFromId = 'scratch';
  render();
  saveData();
}

  s.name = (name||'').trim() || s.name;

  s.duration = duration || s.duration;
  s.currency = currency || s.currency;
  state.editSectionId = null;
  state.showNewSection = false;
  render();
  saveData();
}

function addEntry(sectionId, noteId, rawValue){
  const note = findNote(sectionId, noteId);
  if(!note) return;
  const trimmed = (rawValue || '').trim();
  const match = trimmed.match(/^(-?[\d,]+(?:\.\d{1,2})?)\s+(.+)$/);
  if(!match){
    state.entryError = trimmed ? 'Start with a number, like \u201c150 Groceries\u201d' : null;
    pendingFocus = 'entry-input';
    render();
    return;
  }
  state.entryError = null;
  const amount = parseFloat(match[1].replace(/,/g, ''));
  const desc = match[2].trim();
  note.entries.unshift({ id: uid(), amount, desc, date: new Date().toISOString(), tag: null });
  pendingFocus = 'entry-input';
  render();
  saveData();
}

function deleteEntry(sectionId, noteId, entryId){
  const note = findNote(sectionId, noteId);
  if(note) note.entries = note.entries.filter(e => e.id !== entryId);
  state.confirmDeleteEntry = null;
  render();
  saveData();
}

function cycleTag(sectionId, noteId, entryId){
  const note = findNote(sectionId, noteId);
  if(!note) return;
  const entry = note.entries.find(e => e.id === entryId);
  if(!entry) return;
  entry.tag = entry.tag === null ? 'essential' : entry.tag === 'essential' ? 'discretionary' : null;
  render();
  saveData();
}

  due.person = (name || '').trim() || due.person;

  render();

function addTransaction(dueId, rawValue, buttonSign, dateStr){
  const due = state.dues.find(d => d.id === dueId);
  if(!due) return;
  const trimmed = (rawValue || '').trim();
  const match = trimmed.match(/^([+-])?\s*([\d,]+(?:\.\d{1,2})?)\s+([^.]+)(?:\.(.*))?$/);
  if(!match){
    state.transactionError = trimmed ? 'Try an amount then a reason, like \u201c5000 medical help\u201d' : null;
    pendingFocus = 'transaction-input';
    render();
    return;
  }
  const sign = match[1] || buttonSign;
  if(!sign){
    state.transactionError = 'Tap Borrowed or Repaid below, or start with + or -.';
    pendingFocus = 'transaction-input';
    render();
    return;
  }
  state.transactionError = null;
  const amountAbs = parseFloat(match[2].replace(/,/g, ''));
  const desc = match[3].trim();
  const comment = match[4] ? match[4].trim() : '';
  const signedAmount = sign === '-' ? -amountAbs : amountAbs;
  const txDate = dateStr ? new Date(dateStr + 'T00:00:00').toISOString() : new Date().toISOString();
  due.transactions.unshift({ id: uid(), amount: signedAmount, desc, comment, date: txDate });
  state.showAddTxFor = null;
  render();
  saveData();
}

function deleteTransaction(dueId, txId){
  const due = state.dues.find(d => d.id === dueId);
  if(due) due.transactions = due.transactions.filter(t => t.id !== txId);
  state.confirmDeleteTx = null;
  render();
  saveData();
}

function shareRecords(dueId){
  const due = state.dues.find(d => d.id === dueId);
  if(!due) return;
  const sym = state.settings.defaultCurrency;
  const labels = dueTypeLabels(due.type);
  const { principal, settled, pending } = txTotals(due);
  const lines = [];
  lines.push(`${due.person} \u2014 ${due.type === 'lent' ? 'Lent' : 'Borrowed'}`);
  lines.push(`${labels.principalLabel}: ${formatMoney(principal, sym)}   ${labels.settledLabel}: ${formatMoney(settled, sym)}   Pending: ${formatMoney(Math.max(0,pending), sym)}`);
  lines.push('');
  due.transactions.slice().reverse().forEach(t => {
    const sign = t.amount < 0 ? '-' : '+';
    lines.push(`${formatDate(t.date)}  ${sign}${formatMoney(Math.abs(t.amount), sym)}  ${t.desc}${t.comment ? ' (' + t.comment + ')' : ''}`);
  });
  const text = lines.join('\n');
  if(navigator.share){
    navigator.share({ title: due.person + ' \u2014 BudgetNotes', text }).catch(() => {});
  } else {
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = due.person.replace(/[^a-z0-9]+/gi, '-') + '-records.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

async function joinHousehold(code){
  const trimmed = (code || '').trim();
  if(trimmed.length < 20){
    state.syncError = 'That doesn\u2019t look like a full household code. Ask your partner to copy it again.';
    render();
    return;
  }
  if(state.syncBusy) return;
  state.syncBusy = true; state.syncError = null;
  render();
  try{
    const remoteJson = await CloudSync.fetchOnce(trimmed);
    if(!remoteJson){
      state.syncError = 'No household found with that code. Double-check it, or ask your partner to create one first.';
      state.syncBusy = false;
      render();
      return;
    }
    applyRemoteState(remoteJson);
    state.settings.householdId = trimmed; // in case the remote payload's own copy is missing/stale
    await saveData();
    state.syncStatus = 'connecting';
    CloudSync.start(trimmed);
    state.showJoinHousehold = false;
  }catch(e){
    console.warn('Join household failed:', e);
    state.syncError = 'Could not reach the sync server. Check your connection and try again.';
  }
  state.syncBusy = false;
  render();
}

function stopSyncing(){
  CloudSync.stop();
  delete state.settings.householdId;
  state.syncStatus = null;
  state.syncError = null;
  render();
  saveData();
}

function exportData(){
  const blob = new Blob([JSON.stringify({ sections: state.sections, dues: state.dues, todos: state.todos, settings: state.settings }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'budgetnotes-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(Array.isArray(parsed.sections)){
        state.sections = parsed.sections;
      } else if(Array.isArray(parsed.notes)){
        state.sections = parsed.notes.length ? [{
          id: uid(), name: 'My Notes', duration:'monthly',
          totalBudget: parsed.notes.reduce((s,n)=>s+(Number(n.budget)||0),0),
          currency: state.settings.defaultCurrency || 'Rs ', createdAt: new Date().toISOString(),
          notes: parsed.notes.map(n => ({ id:n.id||uid(), title:n.title||'Untitled note', icon:'', budget:Number(n.budget)||0, entries:(n.entries||[]).map(e=>({id:e.id||uid(),amount:e.amount,desc:e.desc,date:e.date,tag:e.tag||null})), createdAt:n.createdAt||new Date().toISOString() }))
        }] : [];
      } else {
        state.sections = [];
      }
      state.dues = (Array.isArray(parsed.dues) ? parsed.dues : []).map(migrateDue);
      state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
      state.settings = parsed.settings || state.settings;
      state.importError = null;
      state.showSettings = false;
      render();
      saveData();
    }catch(err){
      state.importError = 'That file could not be read. Make sure it\u2019s a BudgetNotes backup.';
      render();
    }
  };
  reader.readAsText(file);
}

  const sym = state.settings.defaultCurrency;
  const totalNotes = state.sections.reduce((s,sec) => s + sec.notes.length, 0);
  const totalBudget = state.sections.reduce((s,sec) => s + (Number(sec.totalBudget)||0), 0);
  const totalSpent = allEntriesFlat().reduce((s,e) => s + e.amount, 0);
  const utilized = totalBudget > 0 ? Math.round((totalSpent/totalBudget)*100) : 0;
  const totalSavings = state.sections.reduce((s,sec) => s + sectionSavings(sec), 0);

  const statsCard = `
  <div class="card">
    <div class="stats-row">
      <div class="stat-col"><span class="stat-label">Notes</span><span class="stat-value">${totalNotes}</span></div>

      <div class="stat-col"><span class="stat-label">Utilized</span><span class="stat-value">${utilized}%</span></div>
    </div>

      <span class="savings-value">${formatMoney(totalSavings, sym)}</span>
    </div>
  </div>`;

    leadingCard = `<div class="card leading-card">${emptyState('No expenses yet', 'Once you log a few entries in your notes, your biggest expenses will show up here.', null, null)}</div>`;
  } else {
    const max = Math.max(...top5.map(g => g.amount));
    const legend = { essential:0, discretionary:0, untagged:0 };
    top5.forEach(g => { legend[g.tag] = (legend[g.tag]||0) + g.amount; });
    leadingCard = `
    <div class="card leading-card">
      <h3 class="leading-title">Leading expenses</h3>
      <p class="leading-sub">Items that cost you the most</p>
      <div class="rank-list">
        ${top5.map((g,i) => `
          <div class="rank-row">
            <span class="rank-num">${i+1}.</span>
            <span class="rank-desc">${escapeHtml(g.desc)}</span>

            <span class="rank-amount mono">${formatMoney(g.amount, sym)}</span>
          </div>`).join('')}
      </div>
      <div class="legend-row">
        <span class="legend-item"><span class="legend-dot dot-essential"></span>Essential: ${formatMoney(legend.essential, sym)}</span>
        <span class="legend-item"><span class="legend-dot dot-discretionary"></span>Discretionary: ${formatMoney(legend.discretionary, sym)}</span>
        <span class="legend-item"><span class="legend-dot dot-untagged"></span>Untagged: ${formatMoney(legend.untagged, sym)}</span>

  return `<div class="view">${statsCard}${leadingCard}</div>`;

  const totalForProgress = dayTodos.length + carriedOver.length;

      </div>
    </div>
    <p class="dues-tagline">Track loans from banks or friends, paid over time as EMIs or installments.</p>
    <div class="view-head">
      <h2>${state.duesTab==='lent' ? 'People who owe you' : 'People you owe'}</h2>
      <button class="btn-primary" data-action="open-new-due">+ Add lender</button>
    </div>
    ${filtered.length===0
      ? emptyState(
          state.duesTab==='lent' ? 'No one owes you yet' : 'You don\u2019t owe anyone yet',
          state.duesTab==='lent' ? 'Add a lender to start tracking money you\u2019ve lent out.' : 'Add a lender to start tracking a loan, EMI, or money you owe.',
          '+ Add lender', 'open-new-due')
      : `<div class="due-list">${filtered.map(dueCard).join('')}</div>`}
  </div>`;
}

function currencyOptions(selected){
  const opts = [['Rs ','Rs Pakistani Rupee'],['$','$ Dollar'],['\u20B9','\u20B9 Indian Rupee'],['\u20AC','\u20AC Euro'],['\u00A3','\u00A3 Pound'],['\u00A5','\u00A5 Yen']];
  return opts.map(([v,label]) => `<option value="${v}" ${selected===v?'selected':''}>${label}</option>`).join('') + `<option value="custom">Custom symbol</option>`;
}

function sectionModal(){
  const editing = state.editSectionId ? findSection(state.editSectionId) : null;
  const copyFromId = !editing ? (state.sectionCopyFromId || 'scratch') : null;
  const copySource = (copyFromId && copyFromId !== 'scratch') ? findSection(copyFromId) : null;

  const duration = editing ? editing.duration : (copySource ? copySource.duration : 'monthly');
  const name = editing ? editing.name : suggestSectionName(duration);
  const budget = editing ? editing.totalBudget : (copySource ? copySource.totalBudget : '');
  const currency = editing ? editing.currency : (copySource ? copySource.currency : (state.settings.defaultCurrency || 'Rs '));

  const showCopyOption = !editing && state.sections.length > 0;

  return `
  <div class="overlay">
    <div class="modal">
      <h3>${editing ? 'Edit section' : 'New section'}</h3>
      <form data-form="section" data-edit-id="${editing ? editing.id : ''}">
        ${showCopyOption ? `
        <label>Start from
          <select name="copyFrom">
            <option value="scratch" ${copyFromId==='scratch'?'selected':''}>Scratch (blank)</option>
            ${state.sections.map(s => `<option value="${s.id}" ${copyFromId===s.id?'selected':''}>Copy from "${escapeHtml(s.name)}"</option>`).join('')}
          </select>
        </label>
        ${copySource ? `<p class="copy-hint">${copySource.notes.length} ${copySource.notes.length===1?'category':'categories'} will be copied in with their budgets, but no entries.</p>` : ''}
        ` : ''}
        <label>Duration
          <select name="duration">
            <option value="weekly" ${duration==='weekly'?'selected':''}>Weekly</option>
            <option value="monthly" ${duration==='monthly'?'selected':''}>Monthly</option>
            <option value="yearly" ${duration==='yearly'?'selected':''}>Yearly</option>
          </select>
        </label>
        <label>Name
          <input name="name" type="text" value="${escapeHtml(name)}" placeholder="May 2026" required />
        </label>
        <label>Total budget
          <input name="totalBudget" type="number" min="0" step="0.01" value="${budget}" placeholder="65000" required />
        </label>
        <label>Currency
          <select name="currency">${currencyOptions(currency)}</select>
        </label>
        <input name="customCurrency" type="text" maxlength="3" placeholder="Custom symbol" class="custom-currency-input" />
        <div class="modal-actions">
          <button type="button" class="btn-secondary" data-action="close-modal">Cancel</button>
          <button type="submit" class="btn-primary">${editing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    </div>
  </div>`;
}

function noteModal(){
  return `
  <div class="overlay">
    <div class="modal">
      <h3>Add a note</h3>
      <form data-form="note" data-section-id="${state.showNewNoteFor}">
        <label>Title
          <input name="title" type="text" placeholder="Groceries" required />
        </label>
        <div class="field-row">
          <label>Icon <span class="ink-faint">(optional)</span>
            <input name="icon" type="text" maxlength="4" placeholder="\uD83D\uDED2" />
          </label>
          <label>Budget
            <input name="budget" type="number" min="0" step="0.01" placeholder="30000" required />
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" data-action="close-modal">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>`;
}

function newDueModal(){
  return `
  <div class="overlay">
    <div class="modal">
      <h3>Add a lender</h3>
      <form data-form="new-due">
        <div class="radio-row">
          <label><input type="radio" name="type" value="lent" ${state.duesTab==='lent'?'checked':''}/> Lent (they owe you)</label>
          <label><input type="radio" name="type" value="borrowed" ${state.duesTab==='borrowed'?'checked':''}/> Borrowed (you owe them)</label>
        </div>
        <label>Person
          <input name="person" type="text" placeholder="John" required />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" data-action="close-modal">Cancel</button>
          <button type="submit" class="btn-primary">Add</button>
        </div>
      </form>
    </div>
  </div>`;
}

function addTransactionModal(){
  const due = state.dues.find(d => d.id === state.showAddTxFor);
  if(!due) return '';
  const labels = dueTypeLabels(due.type);
  return `
  <div class="overlay">
    <div class="modal">
      <h3>Add Transaction</h3>
      <p class="tx-person-row">Person: <b>${escapeHtml(due.person)}</b></p>
      <div class="tx-hint-card">
        <div class="tx-hint-title">Format:</div>
        <div class="tx-hint-line">&bull; Amount then reason &mdash; e.g., <b>5000 medical help</b></div>
        <div class="tx-hint-line">&bull; Optional comment after a dot &mdash; e.g., <b>5000 rent.Jan installment</b></div>
        <div class="tx-hint-line">&bull; Pick a custom date above if not today</div>
      </div>
      <form data-form="transaction" data-due-id="${due.id}">
        <label>Date
          <input id="transaction-date" name="transaction-date" type="date" value="${new Date().toISOString().slice(0,10)}" />
        </label>
        <input id="transaction-input" name="transaction" type="text" autocomplete="off" placeholder="5000 medical help" />
        ${state.transactionError ? `<div class="form-error">${escapeHtml(state.transactionError)}</div>` : ''}
        <div class="tx-buttons-row">
          <button type="submit" class="btn-tx-neg" data-sign="-">${labels.negBtn}</button>
          <button type="submit" class="btn-tx-pos" data-sign="+">${labels.posBtn}</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" data-action="close-modal">Cancel</button>
        </div>
      </form>
    </div>
  </div>`;
}

function editLenderModal(){
  const due = state.dues.find(d => d.id === state.editLenderId);
  if(!due) return '';
  return `
  <div class="overlay">
    <div class="modal">
      <h3>Rename</h3>
      <form data-form="rename-lender" data-due-id="${due.id}">
        <label>Name
          <input name="person" type="text" value="${escapeHtml(due.person)}" required />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" data-action="close-modal">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>`;
}

function settingsModal(){
  const c = state.settings.defaultCurrency;
  const householdId = state.settings.householdId;
  const statusLabel = state.syncStatus === 'connected' ? 'Connected \u2014 changes sync live'
    : state.syncStatus === 'connecting' ? 'Connecting\u2026'
    : state.syncStatus === 'error' ? 'Connection trouble \u2014 will retry'
    : '';

  let syncSection;
  if(householdId){
    syncSection = `
      <div class="settings-row" style="display:block;">
        <div class="settings-label">Sync with partner</div>
        <div class="sync-status-row">
          <span class="sync-dot ${state.syncStatus||''}"></span>
          <span>${escapeHtml(statusLabel)}</span>
        </div>
        <div class="sync-code-box">
          <span class="sync-code-text">${escapeHtml(householdId)}</span>
          <button type="button" class="icon-btn ghost" data-action="copy-household-code" aria-label="Copy code">Copy</button>
        </div>
        <p class="ink-faint small-print" style="margin:0 0 10px;">Share this code with your partner once \u2014 they enter it under "Join a partner's data" to connect.</p>
        <button type="button" class="btn-secondary small" data-action="stop-syncing">Stop syncing</button>
      </div>`;
  } else if(state.showJoinHousehold){
    syncSection = `
      <div class="settings-row" style="display:block;">
        <div class="settings-label">Join a partner's data</div>
        <form data-form="join-household">
          <label>Code from your partner
            <input name="code" type="text" autocomplete="off" placeholder="paste the code here" />
          </label>
          ${state.syncError ? `<div class="form-error">${escapeHtml(state.syncError)}</div>` : ''}
          <div class="sync-actions-row">
            <button type="button" class="btn-secondary small" data-action="cancel-join-household">Cancel</button>
            <button type="submit" class="btn-primary small" ${state.syncBusy?'disabled':''}>${state.syncBusy ? 'Joining\u2026' : 'Join'}</button>
          </div>
        </form>
        <p class="ink-faint small-print">This replaces your current data on this device with your partner's, then keeps both in sync from then on.</p>
      </div>`;
  } else {
    syncSection = `
      <div class="settings-row" style="display:block;">
        <div class="settings-label">Sync with partner</div>
        <p class="ink-faint small-print" style="margin-top:0;">Add transactions on two phones and see each other's changes live.</p>
        <div class="sync-actions-row">
          <button type="button" class="btn-secondary small" data-action="start-create-household" ${state.syncBusy?'disabled':''}>${state.syncBusy ? 'Creating\u2026' : 'Create &amp; share a code'}</button>
          <button type="button" class="btn-secondary small" data-action="open-join-household">Join a partner's data</button>
        </div>
      </div>`;
  }

  return `
  <div class="overlay">
    <div class="modal">
      <h3>Backup &amp; settings</h3>
      ${syncSection}
      <div class="settings-row">
        <div>
          <div class="settings-label">Default currency</div>
          <select id="default-currency-select">${currencyOptions(c).replace('<option value="custom">Custom symbol</option>','')}</select>
        </div>
      </div>
      <div class="settings-row">
        <button class="btn-secondary" data-action="export-data">Export backup (.json)</button>
        <button class="btn-secondary" data-action="trigger-import">Import backup</button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
      ${state.importError ? `<div class="form-error">${escapeHtml(state.importError)}</div>` : ''}
      <p class="ink-faint small-print">Everything here stays in your account \u2014 nothing is shared${householdId ? ' beyond the partner you sync with' : ''}.</p>
      <div class="modal-actions">
        <button type="button" class="btn-primary" data-action="close-modal">Done</button>
      </div>
    </div>
  </div>`;
}

function attachLivePreview(){
  const input = document.getElementById('entry-input');
  const preview = document.getElementById('entry-preview');
  if(!input || !preview || !state.openNote) return;
  const section = findSection(state.openNote.sectionId);
  const update = () => {
    const v = input.value.trim();
    const match = v.match(/^(-?[\d,]+(?:\.\d{1,2})?)\s+(.+)$/);
    if(match && section){
      preview.textContent = formatMoney(parseFloat(match[1].replace(/,/g,'')), section.currency) + ' \u2192 ' + match[2].trim();
      preview.className = 'entry-preview valid';
    } else if(v){
      preview.textContent = 'Start with a number, like \u201c150 Groceries\u201d';
      preview.className = 'entry-preview hint';
    } else {
      preview.textContent = '';
      preview.className = 'entry-preview';
    }
  };
  input.addEventListener('input', update);
  update();
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = `<div class="loading">Loading your notes&hellip;</div>`;
    return;
  }
  let html = renderHeader();
  html += `<main class="main">`;
  if(state.migrationNotice){
    html += `<div class="toast-info">${escapeHtml(state.migrationNotice)}</div>`;
  }
  if(state.tab === 'home'){
    html += renderHome();
  } else if(state.tab === 'notes'){
    if(state.openNote){
      const section = findSection(state.openNote.sectionId);
      const note = section ? findNote(section.id, state.openNote.noteId) : null;
      html += (section && note) ? renderNoteDetail(section, note) : renderSectionsList();
    } else {
      html += renderSectionsList();
    }
  } else if(state.tab === 'dues'){
    html += renderDuesView();
  } else if(state.tab === 'todos'){
    html += renderTodosView();
  }
  if(state.error){
    html += `<div class="toast-error">${escapeHtml(state.error)}</div>`;
  }
  html += `</main>`;
  if(state.showNewSection) html += sectionModal();
  if(state.showNewNoteFor) html += noteModal();
  if(state.showNewDue) html += newDueModal();
  if(state.showAddTxFor) html += addTransactionModal();
  if(state.editLenderId) html += editLenderModal();
  if(state.showSettings) html += settingsModal();
  app.innerHTML = html;

  if(pendingFocus){
    const el = document.getElementById(pendingFocus);
    if(el) el.focus();
    pendingFocus = null;
  }
  attachLivePreview();
}

function closeAllModals(){
  state.showNewSection = false; state.editSectionId = null; state.sectionCopyFromId = 'scratch';
  state.showNewNoteFor = null; state.showNewDue = false; state.showSettings = false;
  state.showAddTxFor = null; state.editLenderId = null; state.transactionError = null;
  state.showJoinHousehold = false; state.syncError = null;
}

function init(){
  const app = document.getElementById('app');

  app.addEventListener('click', (e) => {
    if(e.target.classList && e.target.classList.contains('overlay')){
      closeAllModals();
      render();
      return;
    }
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    const id = el.dataset.id;
    const sectionId = el.dataset.sectionId;
    const noteId = el.dataset.noteId;
    const entryId = el.dataset.entryId;
    const dueId = el.dataset.dueId;
    const txId = el.dataset.txId;
    switch(action){
      case 'set-tab':
        state.tab = el.dataset.tab; render(); break;
      case 'open-new-section':
        closeAllModals(); state.showNewSection = true; render(); break;
      case 'ask-edit-section':
        closeAllModals(); state.editSectionId = id; state.showNewSection = true; render(); break;
      case 'open-new-note-for':
        closeAllModals(); state.showNewNoteFor = sectionId; render(); break;
      case 'open-new-due':
        closeAllModals(); state.showNewDue = true; render(); break;
      case 'open-settings':
        closeAllModals(); state.showSettings = true; state.importError = null; render(); break;
      case 'toggle-theme':
        toggleTheme(); break;
      case 'close-modal':
        closeAllModals();
        render(); break;
      case 'toggle-section':
        state.expandedSectionIds[id] = !state.expandedSectionIds[id]; render(); break;
      case 'ask-delete-section':
        state.confirmDeleteSection = id; render(); break;
      case 'confirm-delete-section':
        deleteSection(id); break;
      case 'open-note':
        state.openNote = { sectionId, noteId }; state.entryError = null; render(); break;
      case 'back-to-sections':
        state.openNote = null; render(); break;
      case 'ask-delete-note':
        state.confirmDeleteNote = sectionId + ':' + noteId; render(); break;
      case 'confirm-delete-note':
        deleteNote(sectionId, noteId); break;
      case 'ask-delete-entry':
        state.confirmDeleteEntry = entryId; render(); break;
      case 'confirm-delete-entry':
        deleteEntry(sectionId, noteId, entryId); break;
      case 'cycle-tag':
        cycleTag(sectionId, noteId, entryId); break;
      case 'set-dues-tab':
        state.duesTab = el.dataset.duestab; render(); break;
      case 'toggle-due':
        state.expandedDueId = state.expandedDueId === id ? null : id; render(); break;
      case 'open-edit-lender':
        closeAllModals(); state.editLenderId = id; render(); break;
      case 'open-add-tx':
        closeAllModals(); state.showAddTxFor = id; render(); break;
      case 'ask-delete-tx':
        state.confirmDeleteTx = txId; render(); break;
      case 'confirm-delete-tx':
        deleteTransaction(dueId, txId); break;
      case 'share-due':
        shareRecords(id); break;
      case 'ask-delete-due':
        state.confirmDeleteDue = id; render(); break;
      case 'confirm-delete-due':
        deleteDue(id); break;
      case 'toggle-todo':
        toggleTodo(id); break;
      case 'ask-delete-todo':
        state.confirmDeleteTodo = id; render(); break;
      case 'confirm-delete-todo':
        deleteTodo(id); break;
      case 'todo-prev-day':
        state.todoDate = shiftDateStr(state.todoDate || todayStr(), -1); render(); break;
      case 'todo-next-day':
        state.todoDate = shiftDateStr(state.todoDate || todayStr(), 1); render(); break;
      case 'todo-jump-today':
        state.todoDate = todayStr(); render(); break;
      case 'export-data':
        exportData(); break;
      case 'trigger-import': {
        const f = document.getElementById('import-file');
        if(f) f.click();
        break;
      }
      case 'start-create-household':
        createHousehold(); break;
      case 'open-join-household':
        state.showJoinHousehold = true; state.syncError = null; render(); break;
      case 'cancel-join-household':
        state.showJoinHousehold = false; state.syncError = null; render(); break;
      case 'stop-syncing':
        stopSyncing(); break;
      case 'copy-household-code': {
        const code = state.settings.householdId;
        if(code && navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(code).then(() => {
            el.textContent = 'Copied!';
            setTimeout(() => { el.textContent = 'Copy'; }, 1500);
          }).catch(() => {});
        }
        break;
      }
      default: break;
    }
  });

  app.addEventListener('keydown', (e) => {
    if((e.key === 'Enter' || e.key === ' ') && e.target.matches('[data-action][role="button"]')){
      e.preventDefault();
      e.target.click();
    }
  });

  app.addEventListener('submit', (e) => {
    e.preventDefault();
    const form = e.target;
    if(form.dataset.form === 'section'){
      let currency = form.elements['currency'].value;
      if(currency === 'custom') currency = form.elements['customCurrency'].value || 'Rs ';
      const payload = { name: form.elements['name'].value, totalBudget: form.elements['totalBudget'].value, duration: form.elements['duration'].value, currency };
      if(form.dataset.editId){ updateSection(form.dataset.editId, payload); }
      else {
        const copyFromEl = form.elements['copyFrom'];
        const copyFromId = (copyFromEl && copyFromEl.value !== 'scratch') ? copyFromEl.value : null;
        createSection(Object.assign({}, payload, { copyFromId }));
      }
    } else if(form.dataset.form === 'note'){
      createNoteInSection(form.dataset.sectionId, {
        title: form.elements['title'].value,
        icon: form.elements['icon'].value,
        budget: form.elements['budget'].value
      });
    } else if(form.dataset.form === 'entry'){
      addEntry(form.dataset.sectionId, form.dataset.noteId, form.elements['entry'].value);
    } else if(form.dataset.form === 'new-due'){
      createLender({
        type: form.elements['type'].value,
        person: form.elements['person'].value
      });
    } else if(form.dataset.form === 'transaction'){
      const sign = e.submitter ? e.submitter.dataset.sign : null;
      const dateVal = form.elements['transaction-date'] ? form.elements['transaction-date'].value : '';
      addTransaction(form.dataset.dueId, form.elements['transaction'].value, sign, dateVal);
    } else if(form.dataset.form === 'rename-lender'){
      renameLender(form.dataset.dueId, form.elements['person'].value);
    } else if(form.dataset.form === 'todo'){
      addTodo(form.dataset.date, form.elements['todo'].value);
    } else if(form.dataset.form === 'join-household'){
      joinHousehold(form.elements['code'].value);
    }
  });

  app.addEventListener('change', (e) => {
    if(e.target.id === 'import-file' && e.target.files[0]){
      importData(e.target.files[0]);
    }
    if(e.target.id === 'default-currency-select'){
      state.settings.defaultCurrency = e.target.value;
      saveData();
    }
    if(e.target.id === 'note-budget-input'){
      updateNoteBudget(e.target.dataset.sectionId, e.target.dataset.noteId, e.target.value);
    }
    if(e.target.name === 'copyFrom'){
      state.sectionCopyFromId = e.target.value;
      render();
      pendingFocus = null;
      const nameInput = document.querySelector('form[data-form="section"] input[name="name"]');
      if(nameInput) nameInput.focus();
    }
    if(e.target.name === 'currency'){
      const form = e.target.closest('form');
      const customInput = form && form.querySelector('.custom-currency-input');
      if(customInput) customInput.style.display = e.target.value === 'custom' ? 'block' : 'none';
    }
    if(e.target.name === 'duration'){
      const form = e.target.closest('form');
      if(form && form.dataset.form === 'section' && !form.dataset.editId){
        const nameInput = form.elements['name'];
        if(nameInput && !nameInput.dataset.touched){
          nameInput.value = suggestSectionName(e.target.value);
        }
      }
    }
    if(e.target.name === 'name'){
      e.target.dataset.touched = 'true';
    }
  });

  loadData();
}

init();
})();
</script>
</body>
</html>
