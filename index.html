<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BudgetNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F1FA;
  --paper:#FFFFFF;
  --paper-soft:#FBFAFE;
  --ink:#2E2B3D;
  --ink-soft:#6B6580;
  --ink-faint:#9B96B5;
  --line:#E3E0F0;
  --sage:#6FA98C;
  --sage-soft:#DCEEE3;
  --amber:#E0A93D;
  --amber-soft:#FBEBD0;
  --coral:#DD7E73;
  --coral-soft:#FAE0DC;
  --periwinkle:#7C8FD1;
  --sand:#CE9C56;
  --radius:18px;
  --radius-sm:10px;
  --shadow:0 2px 10px rgba(46,43,61,0.08), 0 1px 2px rgba(46,43,61,0.04);
  --shadow-lift:0 10px 26px rgba(46,43,61,0.12);
  --overlay-bg:rgba(46,43,61,0.35);
  --btn-primary-bg:var(--ink);
  --btn-primary-text:#FFFFFF;
  --hover-bg:#F4F2FB;
  --display-color:var(--ink);
  --font-display:'Caveat', cursive;
  --font-body:'Plus Jakarta Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}
:root[data-theme="dark"]{
  --bg:#19181D;
  --paper:#232128;
  --paper-soft:#2B2930;
  --ink:#EDE7DC;
  --ink-soft:#B3ADBD;
  --ink-faint:#7B7588;
  --line:#37343D;
  --sage:#fc785c;
  --sage-soft:#3D2620;
  --amber:#F0BD5E;
  --amber-soft:#3D2F14;
  --coral:#FF6B4A;
  --coral-soft:#3A2218;
  --periwinkle:#9CA8E8;
  --sand:#E0B26B;
  --shadow:0 2px 10px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-lift:0 10px 28px rgba(0,0,0,0.55);
  --overlay-bg:rgba(0,0,0,0.6);
  --btn-primary-bg:#EDE7DC;
  --btn-primary-text:#19181D;
  --hover-bg:#322F39;
  --display-color:#fc785c;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
html{ background:var(--bg); color-scheme:light; }
html[data-theme="dark"]{ color-scheme:dark; }
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  transition:background-color .2s ease, color .2s ease;
}
#app{ max-width:720px; margin:0 auto; padding:24px 20px 80px; min-height:100vh; }

.app-header{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:6px; }
.header-actions{ display:flex; align-items:center; gap:2px; }
.brand{ display:flex; flex-direction:column; }
.brand-mark{ font-family:var(--font-display); font-size:34px; font-weight:700; line-height:1; color:var(--display-color); }
.brand-tag{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-top:2px; }
.icon-btn{ background:none; border:none; font-size:18px; color:var(--ink-soft); cursor:pointer; padding:6px; border-radius:8px; line-height:1; }
.icon-btn:hover{ background:var(--paper); }
.icon-btn.ghost{ font-size:12px; font-weight:600; color:var(--ink-faint); }
.icon-btn.danger{ color:var(--coral); }

.tabs{ display:flex; gap:18px; border-bottom:1px solid var(--line); margin:18px 0 22px; }
.tab{ background:none; border:none; padding:10px 2px; font-family:var(--font-body); font-weight:600; font-size:14px; color:var(--ink-faint); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
.tab.active{ color:var(--ink); border-bottom-color:var(--sage); }
.tab:focus-visible, .icon-btn:focus-visible, button:focus-visible, [tabindex]:focus-visible{ outline:2px solid var(--periwinkle); outline-offset:2px; }

.view-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:10px; }
.view-head h2{ font-family:var(--font-display); font-size:24px; margin:0; font-weight:600; color:var(--display-color); }

.btn-primary{ background:var(--btn-primary-bg); color:var(--btn-primary-text); border:none; padding:10px 16px; border-radius:999px; font-family:var(--font-body); font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap; }
.btn-primary:hover{ opacity:.88; }
.btn-primary.small{ padding:8px 14px; font-size:12px; border-radius:var(--radius-sm); }
.btn-secondary{ background:var(--paper-soft); color:var(--ink); border:1px solid var(--line); padding:9px 14px; border-radius:999px; font-weight:600; font-size:13px; cursor:pointer; }
.btn-secondary.small{ border-radius:var(--radius-sm); padding:8px 12px; font-size:12px; }
.btn-secondary.danger{ color:var(--coral); border-color:var(--coral-soft); background:var(--coral-soft); }

.card{ background:var(--paper); border-radius:var(--radius); padding:16px 16px 14px; box-shadow:var(--shadow); border:1px solid var(--line); position:relative; }
.mono{ font-family:var(--font-mono); }
.ink-faint{ color:var(--ink-faint); }
.ink-soft{ color:var(--ink-soft); }

.bar{ height:10px; border-radius:999px; background:var(--line); overflow:hidden; }
.bar-lg{ height:14px; margin:14px 0 10px; }
.bar-fill{ height:100%; border-radius:999px; transition:width .3s ease; background-image:linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0)); }
.bar-sage .bar-fill{ background-color:var(--sage); }
.bar-amber .bar-fill{ background-color:var(--amber); }
.bar-coral .bar-fill{ background-color:var(--coral); }

.empty{ text-align:center; padding:48px 20px; background:var(--paper); border-radius:var(--radius); }
.empty-title{ font-family:var(--font-display); font-size:22px; margin-bottom:6px; color:var(--display-color); }
.empty-body{ color:var(--ink-soft); font-size:14px; margin-bottom:16px; max-width:320px; margin-left:auto; margin-right:auto; }

.link-back{ background:none; border:none; color:var(--ink-soft); font-size:13px; cursor:pointer; padding:0; margin-bottom:6px; }
.link-back:hover{ color:var(--ink); }

/* Home */
.stats-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.stat-col{ display:flex; flex-direction:column; gap:4px; min-width:0; }
.stat-label{ font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); font-weight:700; }
.stat-value{ font-family:var(--font-mono); font-size:17px; font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; }
.stats-divider{ border-top:1px solid var(--line); margin:14px 0 12px; }
.savings-row{ display:flex; justify-content:space-between; align-items:baseline; }
.savings-label{ font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); font-weight:700; }
.savings-value{ font-family:var(--font-mono); font-size:20px; font-weight:700; color:var(--sage); }

.leading-card{ margin-top:16px; }
.leading-title{ font-family:var(--font-display); font-size:20px; font-weight:600; margin:0; color:var(--display-color); }
.leading-sub{ font-size:12px; color:var(--ink-faint); margin:2px 0 14px; }
.rank-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
.rank-row{ display:grid; grid-template-columns:18px 1fr 90px auto; align-items:center; gap:10px; font-size:13px; }
.rank-num{ color:var(--ink-faint); font-weight:700; font-size:12px; }
.rank-desc{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-bar{ height:8px; border-radius:999px; background:var(--line); overflow:hidden; }
.rank-bar-fill{ height:100%; border-radius:999px; background:var(--periwinkle); }
.rank-amount{ font-family:var(--font-mono); font-weight:600; text-align:right; white-space:nowrap; }
.legend-row{ display:flex; gap:16px; flex-wrap:wrap; padding-top:10px; border-top:1px solid var(--line); font-size:12px; color:var(--ink-soft); }
.legend-item{ display:flex; align-items:center; gap:6px; }
.legend-dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
.dot-essential{ background:var(--sage); }
.dot-discretionary{ background:var(--periwinkle); }
.dot-untagged{ background:var(--ink-faint); }

/* Sections (Notes tab) */
.section-list{ display:flex; flex-direction:column; gap:14px; }
.section-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; cursor:pointer; }
.section-name-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.section-name{ font-family:var(--font-display); font-size:24px; font-weight:600; margin:0; color:var(--display-color); }
.duration-badge{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; background:var(--paper-soft); color:var(--ink-soft); padding:3px 9px; border-radius:999px; border:1px solid var(--line); }
.section-actions{ display:flex; align-items:center; gap:0px; flex-shrink:0; }
.chevron{ font-size:13px; color:var(--ink-faint); transition:transform .15s; display:inline-block; }
.chevron.open{ transform:rotate(90deg); }
.section-stats{ display:flex; gap:16px; flex-wrap:wrap; font-size:13px; margin:10px 0 8px; }
.section-stats b{ font-weight:600; }
.section-expand{ margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:flex; flex-direction:column; gap:8px; }
.note-row{ background:var(--paper-soft); border-radius:var(--radius-sm); padding:10px 12px; cursor:pointer; transition:background .15s; }
.note-row:hover{ background:var(--hover-bg); }
.note-row-top{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
.note-row-title{ font-weight:600; font-size:14px; }
.note-row-amount{ font-family:var(--font-mono); font-size:13px; color:var(--ink-soft); white-space:nowrap; }
.note-row-bar{ margin-top:6px; height:6px; }

/* Note detail */
.detail-head{ display:flex; align-items:flex-start; justify-content:space-between; margin:10px 0 4px; gap:14px; flex-wrap:wrap; }
.note-title-lg{ font-family:var(--font-display); font-size:32px; margin:0; font-weight:600; color:var(--display-color); }
.budget-edit{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
.budget-edit label{ font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); font-weight:700; margin:0; }
.budget-input-inline{ width:130px; text-align:right; font-family:var(--font-mono); font-weight:600; padding:7px 10px; }
.detail-stats{ display:flex; gap:8px; font-size:14px; margin-bottom:6px; flex-wrap:wrap; }
.text-coral{ color:var(--coral); font-weight:600; }
.allocate-hint{ font-size:12px; color:var(--ink-faint); margin-bottom:16px; }

.entry-form{ display:flex; gap:8px; margin-bottom:6px; }
.entry-form input{ flex:1; }
.entry-preview{ font-size:12px; min-height:16px; margin:2px 2px 12px; color:var(--ink-faint); }
.entry-preview.valid{ color:var(--sage); font-weight:600; }
.entry-preview.hint{ color:var(--ink-faint); }
.form-error{ font-size:12px; color:var(--coral); margin:-2px 2px 12px; }

.budget-items-card{ margin:18px 0 16px; }
.bi-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.bi-title{ font-weight:700; font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); }
.bi-row{ display:grid; grid-template-columns:84px 1fr auto; gap:10px; padding:7px 2px; border-bottom:1px solid var(--line); font-size:13px; align-items:center; }
.bi-row:last-child{ border-bottom:none; }
.bi-row .mono{ font-weight:600; }
.bi-pct{ color:var(--ink-faint); font-size:12px; white-space:nowrap; }

.ledger{ display:flex; flex-direction:column; border-top:1px solid var(--line); }
.ledger-row{ display:grid; grid-template-columns:20px 84px 1fr auto auto; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid var(--line); font-size:14px; }
.ledger-row .amount{ font-weight:600; }
.ledger-row .date{ font-size:12px; }

.tag-btn{ width:16px; height:16px; border-radius:50%; border:2px solid var(--line); background:var(--paper); cursor:pointer; padding:0; flex-shrink:0; }
.tag-btn.tag-essential{ background:var(--sage); border-color:var(--sage); }
.tag-btn.tag-discretionary{ background:var(--periwinkle); border-color:var(--periwinkle); }

/* Dues */
.dues-summary-row{ display:flex; gap:12px; margin-bottom:10px; }
.dues-summary-card{ flex:1; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; cursor:pointer; display:flex; flex-direction:column; gap:6px; box-shadow:var(--shadow); transition:border-color .15s; }
.dues-summary-card.active{ border-color:var(--periwinkle); }
.dues-summary-label{ font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
.dues-summary-value{ font-size:18px; font-weight:700; }
.dues-tagline{ font-size:12px; color:var(--ink-faint); margin:0 0 18px; }
.text-sage{ color:var(--sage); }
.due-list{ display:flex; flex-direction:column; gap:12px; }
.due-top{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; gap:10px; }
.due-person-row{ display:flex; align-items:center; gap:4px; }
.due-person{ font-weight:700; font-size:16px; }
.due-amount-row{ display:flex; align-items:center; gap:8px; }
.due-amount{ font-size:16px; font-weight:600; white-space:nowrap; }
.accent-periwinkle{ color:var(--periwinkle); }
.accent-sand{ color:var(--sand); }
.due-stats{ display:flex; gap:16px; font-size:13px; margin:10px 0 8px; color:var(--ink-soft); }
.due-stats b{ font-weight:600; color:var(--ink); }
.due-banner{ background:var(--paper-soft); border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.due-banner-amount{ font-weight:700; font-size:15px; }
.due-banner-label{ font-size:12px; color:var(--ink-soft); }
.due-expand{ margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); display:flex; flex-direction:column; gap:10px; }
.due-actions-row{ display:flex; gap:8px; }
.tx-list{ display:flex; flex-direction:column; gap:6px; }
.tx-row{ display:grid; grid-template-columns:90px 1fr auto; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--radius-sm); font-size:13px; }
.tx-row.positive{ background:var(--sage-soft); }
.tx-row.negative{ background:var(--coral-soft); }
.tx-row.positive .tx-amount{ color:var(--sage); font-weight:700; }
.tx-row.negative .tx-amount{ color:var(--coral); font-weight:700; }
.tx-person-row{ font-size:13px; color:var(--ink-soft); margin:-6px 0 14px; }
.tx-hint-card{ background:var(--paper-soft); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:14px; font-size:12px; color:var(--ink-soft); }
.tx-hint-title{ font-weight:700; margin-bottom:4px; color:var(--ink); }
.tx-hint-line{ margin:2px 0; }
.tx-buttons-row{ display:flex; gap:10px; margin:4px 0 12px; }
.btn-tx-neg, .btn-tx-pos{ flex:1; border:none; border-radius:var(--radius-sm); padding:12px; font-weight:700; font-size:13px; cursor:pointer; font-family:var(--font-body); }
.btn-tx-neg{ background:var(--coral-soft); color:var(--coral); }
.btn-tx-pos{ background:var(--sage-soft); color:var(--sage); }
.todo-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.todo-date-main{ font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--display-color); }
.todo-progress-label{ font-size:12px; color:var(--ink-faint); margin:4px 0 16px; text-align:right; }
.todo-section-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); margin:14px 0 8px; }
.todo-list{ display:flex; flex-direction:column; gap:6px; margin-bottom:6px; }
.todo-row{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 12px; }
.todo-row.done{ opacity:.6; }
.todo-check{ width:22px; height:22px; border-radius:50%; border:2px solid var(--line); background:var(--paper-soft); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; color:#fff; padding:0; }
.todo-check.checked{ background:var(--sage); border-color:var(--sage); }
.todo-text{ flex:1; font-size:14px; }
.todo-row.done .todo-text{ text-decoration:line-through; color:var(--ink-faint); }
.todo-date-tag{ font-size:11px; white-space:nowrap; }

input[type=text], input[type=number], input[type=date], select{
  width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:var(--radius-sm);
  font-family:var(--font-body); font-size:14px; background:var(--paper-soft); color:var(--ink);
}
input:focus, select:focus{ outline:2px solid var(--sage); outline-offset:1px; }
label{ display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:12px; }
label input, label select{ margin-top:6px; }
.custom-currency-input{ display:none; margin-top:-4px; margin-bottom:12px; }
.radio-row{ display:flex; gap:18px; margin-bottom:14px; font-size:13px; font-weight:600; color:var(--ink-soft); }
.radio-row label{ display:flex; align-items:center; gap:6px; margin-bottom:0; }
.radio-row input{ width:auto; }
.field-row{ display:flex; gap:10px; }
.field-row > label{ flex:1; }

.overlay{ position:fixed; inset:0; background:var(--overlay-bg); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
.modal{ background:var(--paper); border-radius:var(--radius); padding:24px; width:100%; max-width:380px; max-height:86vh; overflow-y:auto; box-shadow:var(--shadow-lift); }
.modal h3{ font-family:var(--font-display); font-size:24px; margin:0 0 16px; font-weight:600; color:var(--display-color); }
.modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:8px; }
.settings-row{ margin-bottom:16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.settings-label{ font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
.small-print{ font-size:12px; }

.loading{ text-align:center; padding:80px 20px; color:var(--ink-soft); font-family:var(--font-display); font-size:20px; }
.toast-error{ background:var(--coral-soft); color:var(--coral); padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-top:14px; }
.toast-info{ background:var(--sage-soft); color:var(--sage); padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:14px; }

@media (max-width:480px){
  .brand-mark{ font-size:28px; }
  .stats-row{ grid-template-columns:repeat(2,1fr); gap:14px; }
  .ledger-row{ grid-template-columns:16px 70px 1fr auto; }
  .ledger-row .date{ display:none; }
}
@media (prefers-reduced-motion:reduce){
  *{ transition:none !important; }
}
</style>

<div id="app"></div>

<script>
(function(){

if(!window.storage){
  // window.storage only exists inside Claude.ai's artifact viewer. When this
  // file is opened as a regular webpage (e.g. hosted on GitHub Pages), we
  // back it with localStorage instead so data actually survives a refresh.
  let localStorageWorks = false;
  try{
    const testKey = '__budgetnotes_storage_test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
    localStorageWorks = true;
  }catch(e){ localStorageWorks = false; }

  if(localStorageWorks){
    console.info('BudgetNotes: using localStorage for persistence (this page is not running inside Claude.ai).');
    window.storage = {
      async get(key){
        const v = window.localStorage.getItem(key);
        if(v === null) throw new Error('not found');
        return { key, value: v, shared: false };
      },
      async set(key, value){
        window.localStorage.setItem(key, value);
        return { key, value, shared: false };
      },
      async delete(key){
        window.localStorage.removeItem(key);
        return { key, deleted: true, shared: false };
      },
      async list(prefix){
        const keys = [];
        for(let i = 0; i < window.localStorage.length; i++){
          const k = window.localStorage.key(i);
          if(!prefix || k.startsWith(prefix)) keys.push(k);
        }
        return { keys, prefix, shared: false };
      }
    };
  } else {
    console.warn('BudgetNotes: no persistent storage available in this browser — data will not survive a refresh.');
    const mem = {};
    window.storage = {
      async get(key){ if(!(key in mem)) throw new Error('not found'); return {key, value:mem[key], shared:false}; },
      async set(key, value){ mem[key]=value; return {key, value, shared:false}; },
      async delete(key){ delete mem[key]; return {key, deleted:true, shared:false}; },
      async list(prefix){ return {keys:Object.keys(mem).filter(k=>!prefix||k.startsWith(prefix)), prefix, shared:false}; }
    };
  }
}

const STORAGE_KEY = 'app:data';

let state = {
  sections: [],
  dues: [],
  todos: [],
  todoDate: null,
  settings: { defaultCurrency: 'Rs ' },
  tab: 'home',
  duesTab: 'lent',
  expandedSectionIds: {},
  openNote: null, // { sectionId, noteId }
  showNewSection: false,
  editSectionId: null,
  showNewNoteFor: null, // sectionId
  showNewDue: false,
  showAddTxFor: null, // dueId
  editLenderId: null,
  showSettings: false,
  expandedDueId: null,
  confirmDeleteSection: null,
  confirmDeleteNote: null, // "sectionId:noteId"
  confirmDeleteEntry: null,
  confirmDeleteDue: null,
  confirmDeleteTx: null,
  confirmDeleteTodo: null,
  entryError: null,
  transactionError: null,
  importError: null,
  migrationNotice: null,
  error: null,
  loaded: false,
};

let pendingFocus = null;

function uid(){ return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatMoney(amount, symbol){
  const n = Number(amount) || 0;
  const neg = n < 0;
  const abs = Math.abs(n);
  const fixed = (Math.round(abs*100)/100) % 1 === 0 ? abs.toFixed(0) : abs.toFixed(2);
  const parts = fixed.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const out = parts.join('.');
  return (neg ? '-' : '') + (symbol || '') + out;
}

function formatDate(iso){
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}

function daysBetween(iso){
  const d = new Date(iso);
  if(isNaN(d)) return 0;
  return Math.max(0, Math.floor((Date.now() - d.getTime()) / 86400000));
}

function detectSystemTheme(){
  try{
    if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
  }catch(e){}
  return 'light';
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.settings.theme === 'dark' ? 'dark' : 'light');
}

function toggleTheme(){
  state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  render();
  saveData();
}

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function shiftDateStr(dateStr, deltaDays){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + deltaDays);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatTodoDateLabel(dateStr){
  const today = todayStr();
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(today + 'T00:00:00');
  const diffDays = Math.round((d - t) / 86400000);
  const monthDay = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  if(diffDays === 0) return 'Today, ' + monthDay;
  if(diffDays === 1) return 'Tomorrow, ' + monthDay;
  if(diffDays === -1) return 'Yesterday, ' + monthDay;
  return d.toLocaleDateString(undefined, { weekday:'long' }) + ', ' + monthDay;
}

function suggestSectionName(duration){
  const now = new Date();
  if(duration === 'yearly') return String(now.getFullYear());
  if(duration === 'weekly') return 'Week of ' + now.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  return now.toLocaleDateString(undefined, { month:'long', year:'numeric' });
}

// Groups entries by description (case-insensitive), summing amounts and
// picking the majority tag. Used for "Budget Items" and "Leading Expenses".
function groupEntries(entries){
  const map = new Map();
  entries.forEach(e => {
    const key = (e.desc || '').trim().toLowerCase();
    if(!key) return;
    if(!map.has(key)){
      map.set(key, { desc: e.desc.trim(), amount: 0, count: 0, tagCounts: {} });
    }
    const g = map.get(key);
    g.amount += Number(e.amount) || 0;
    g.count += 1;
    const t = e.tag || 'untagged';
    g.tagCounts[t] = (g.tagCounts[t] || 0) + 1;
  });
  const groups = [...map.values()].map(g => {
    let bestTag = 'untagged', bestCount = -1;
    Object.keys(g.tagCounts).forEach(t => { if(g.tagCounts[t] > bestCount){ bestCount = g.tagCounts[t]; bestTag = t; } });
    return { desc: g.desc, amount: g.amount, count: g.count, tag: bestTag };
  });
  groups.sort((a,b) => b.amount - a.amount);
  return groups;
}

function migrateDue(d){
  if(Array.isArray(d.transactions)) return d;
  const transactions = [];
  if(d.amount){
    transactions.push({
      id: uid(),
      amount: -(Number(d.amount) || 0),
      desc: (d.note || '').trim() || 'Initial amount',
      comment: '',
      date: d.date ? new Date(d.date).toISOString() : (d.createdAt || new Date().toISOString())
    });
  }
  (d.payments || []).forEach(p => {
    transactions.push({ id: p.id || uid(), amount: Number(p.amount) || 0, desc: 'Paid', comment: '', date: p.date || new Date().toISOString() });
  });
  return {
    id: d.id || uid(),
    type: d.type === 'borrowed' ? 'borrowed' : 'lent',
    person: d.person || 'Unnamed',
    transactions,
    createdAt: d.createdAt || new Date().toISOString()
  };
}

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.settings = parsed.settings || { defaultCurrency: 'Rs ' };
      if(Array.isArray(parsed.sections)){
        state.sections = parsed.sections;
      } else if(Array.isArray(parsed.notes) && parsed.notes.length){
        // Migrate the old flat-notes format (no sections) into one section.
        const migrated = {
          id: uid(),
          name: 'My Notes',
          totalBudget: parsed.notes.reduce((s,n) => s + (Number(n.budget)||0), 0),
          duration: 'monthly',
          currency: parsed.notes[0].currency || state.settings.defaultCurrency || 'Rs ',
          createdAt: new Date().toISOString(),
          notes: parsed.notes.map(n => ({
            id: n.id || uid(),
            title: n.title || 'Untitled note',
            icon: '',
            budget: Number(n.budget) || 0,
            entries: (n.entries || []).map(e => ({ id: e.id || uid(), amount: e.amount, desc: e.desc, date: e.date, tag: e.tag || null })),
            createdAt: n.createdAt || new Date().toISOString()
          }))
        };
        state.sections = [migrated];
        state.migrationNotice = 'Your earlier notes were moved into a new section called "My Notes" so nothing was lost.';
      } else {
        state.sections = [];
      }
      state.dues = (parsed.dues || []).map(migrateDue);
      state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
    }
  } catch(e){
    state.sections = [];
    state.dues = [];
    state.todos = [];
    state.settings = { defaultCurrency: 'Rs ' };
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify({ sections: [], dues: [], todos: [], settings: state.settings }), false);
    }catch(e2){ console.error('Could not initialize storage', e2); }
  }
  state.todoDate = todayStr();
  if(!state.settings.theme){
    state.settings.theme = detectSystemTheme();
  }
  applyTheme();
  if(state.sections.length){
    state.expandedSectionIds[state.sections[0].id] = true;
  }
  state.loaded = true;
  render();
}

async function saveData(){
  try{
    const result = await window.storage.set(STORAGE_KEY, JSON.stringify({
      sections: state.sections, dues: state.dues, todos: state.todos, settings: state.settings
    }), false);
    const hadError = !!state.error;
    state.error = result ? null : 'Could not save just now. Your latest change may not persist.';
    if(hadError !== !!state.error) render();
  }catch(e){
    console.error(e);
    state.error = 'Could not save just now. Your latest change may not persist.';
    render();
  }
}

function findSection(sectionId){ return state.sections.find(s => s.id === sectionId); }
function findNote(sectionId, noteId){
  const s = findSection(sectionId);
  return s ? s.notes.find(n => n.id === noteId) : null;
}

function sectionAllocated(section){ return section.notes.reduce((s,n) => s + (Number(n.budget)||0), 0); }
function sectionSpent(section){ return section.notes.reduce((s,n) => s + n.entries.reduce((s2,e)=>s2+e.amount,0), 0); }
function sectionSavings(section){ return Math.max(0, section.totalBudget - sectionAllocated(section)); }

function noteSpent(note){ return note.entries.reduce((s,e) => s + e.amount, 0); }

function txTotals(due){
  let principal = 0, settled = 0;
  due.transactions.forEach(t => { if(t.amount < 0) principal += -t.amount; else settled += t.amount; });
  return { principal, settled, pending: principal - settled };
}

function dueTypeLabels(type){
  return type === 'lent'
    ? { negBtn:'Lent (-)', posBtn:'Received (+)', principalLabel:'Lent', settledLabel:'Received', bannerLabel:'Amount to receive' }
    : { negBtn:'Borrowed (-)', posBtn:'Repaid (+)', principalLabel:'Borrowed', settledLabel:'Paid', bannerLabel:'Amount to pay' };
}

function dueGroupTotal(type){
  return state.dues.filter(d => d.type === type).reduce((s,d) => s + Math.max(0, txTotals(d).pending), 0);
}

/* ---------- mutations ---------- */

function addTodo(dateStr, text){
  const trimmed = (text || '').trim();
  if(!trimmed) return;
  state.todos.unshift({ id: uid(), text: trimmed, done: false, date: dateStr || todayStr(), createdAt: new Date().toISOString() });
  pendingFocus = 'todo-input';
  render();
  saveData();
}

function toggleTodo(id){
  const t = state.todos.find(t => t.id === id);
  if(!t) return;
  t.done = !t.done;
  render();
  saveData();
}

function deleteTodo(id){
  state.todos = state.todos.filter(t => t.id !== id);
  state.confirmDeleteTodo = null;
  render();
  saveData();
}

function createSection({name, totalBudget, duration, currency}){
  const section = {
    id: uid(),
    name: (name||'').trim() || suggestSectionName(duration),
    totalBudget: Number(totalBudget) || 0,
    duration: duration || 'monthly',
    currency: currency || state.settings.defaultCurrency || 'Rs ',
    createdAt: new Date().toISOString(),
    notes: []
  };
  state.sections.unshift(section);
  state.expandedSectionIds[section.id] = true;
  state.showNewSection = false;
  render();
  saveData();
}

function updateSection(id, {name, totalBudget, duration, currency}){
  const s = findSection(id);
  if(!s) return;
  s.name = (name||'').trim() || s.name;
  s.totalBudget = Number(totalBudget) || 0;
  s.duration = duration || s.duration;
  s.currency = currency || s.currency;
  state.editSectionId = null;
  state.showNewSection = false;
  render();
  saveData();
}

function deleteSection(id){
  state.sections = state.sections.filter(s => s.id !== id);
  if(state.openNote && state.openNote.sectionId === id) state.openNote = null;
  state.confirmDeleteSection = null;
  render();
  saveData();
}

function createNoteInSection(sectionId, {title, icon, budget}){
  const s = findSection(sectionId);
  if(!s) return;
  const note = {
    id: uid(),
    title: (title||'').trim() || 'Untitled note',
    icon: (icon||'').trim().slice(0,4),
    budget: Number(budget) || 0,
    entries: [],
    createdAt: new Date().toISOString()
  };
  s.notes.unshift(note);
  state.showNewNoteFor = null;
  state.openNote = { sectionId, noteId: note.id };
  render();
  saveData();
}

function deleteNote(sectionId, noteId){
  const s = findSection(sectionId);
  if(s) s.notes = s.notes.filter(n => n.id !== noteId);
  if(state.openNote && state.openNote.noteId === noteId) state.openNote = null;
  state.confirmDeleteNote = null;
  render();
  saveData();
}

function updateNoteBudget(sectionId, noteId, value){
  const n = findNote(sectionId, noteId);
  if(!n) return;
  n.budget = Number(value) || 0;
  render();
  saveData();
}

function addEntry(sectionId, noteId, rawValue){
  const note = findNote(sectionId, noteId);
  if(!note) return;
  const trimmed = (rawValue || '').trim();
  const match = trimmed.match(/^(-?[\d,]+(?:\.\d{1,2})?)\s+(.+)$/);
  if(!match){
    state.entryError = trimmed ? 'Start with a number, like \u201c150 Groceries\u201d' : null;
    pendingFocus = 'entry-input';
    render();
    return;
  }
  state.entryError = null;
  const amount = parseFloat(match[1].replace(/,/g, ''));
  const desc = match[2].trim();
  note.entries.unshift({ id: uid(), amount, desc, date: new Date().toISOString(), tag: null });
  pendingFocus = 'entry-input';
  render();
  saveData();
}

function deleteEntry(sectionId, noteId, entryId){
  const note = findNote(sectionId, noteId);
  if(note) note.entries = note.entries.filter(e => e.id !== entryId);
  state.confirmDeleteEntry = null;
  render();
  saveData();
}

function cycleTag(sectionId, noteId, entryId){
  const note = findNote(sectionId, noteId);
  if(!note) return;
  const entry = note.entries.find(e => e.id === entryId);
  if(!entry) return;
  entry.tag = entry.tag === null ? 'essential' : entry.tag === 'essential' ? 'discretionary' : null;
  render();
  saveData();
}

function createLender({type, person}){
  const due = {
    id: uid(),
    type: type === 'lent' ? 'lent' : 'borrowed',
    person: (person || '').trim() || 'Unnamed',
    transactions: [],
    createdAt: new Date().toISOString()
  };
  state.dues.unshift(due);
  state.showNewDue = false;
  state.duesTab = due.type;
  state.expandedDueId = due.id;
  state.showAddTxFor = due.id;
  render();
  saveData();
}

function deleteDue(id){
  state.dues = state.dues.filter(d => d.id !== id);
  if(state.expandedDueId === id) state.expandedDueId = null;
  state.confirmDeleteDue = null;
  render();
  saveData();
}

function renameLender(id, name){
  const due = state.dues.find(d => d.id === id);
  if(!due) return;
  due.person = (name || '').trim() || due.person;
  state.editLenderId = null;
  render();
  saveData();
}

function addTransaction(dueId, rawValue, buttonSign){
  const due = state.dues.find(d => d.id === dueId);
  if(!due) return;
  const trimmed = (rawValue || '').trim();
  const match = trimmed.match(/^([+-])?\s*([\d,]+(?:\.\d{1,2})?)\s+([^.]+)(?:\.(.*))?$/);
  if(!match){
    state.transactionError = trimmed ? 'Try an amount then a reason, like \u201c5000 medical help\u201d' : null;
    pendingFocus = 'transaction-input';
    render();
    return;
  }
  const sign = match[1] || buttonSign;
  if(!sign){
    state.transactionError = 'Tap Borrowed or Repaid below, or start with + or -.';
    pendingFocus = 'transaction-input';
    render();
    return;
  }
  state.transactionError = null;
  const amountAbs = parseFloat(match[2].replace(/,/g, ''));
  const desc = match[3].trim();
  const comment = match[4] ? match[4].trim() : '';
  const signedAmount = sign === '-' ? -amountAbs : amountAbs;
  due.transactions.unshift({ id: uid(), amount: signedAmount, desc, comment, date: new Date().toISOString() });
  state.showAddTxFor = null;
  render();
  saveData();
}

function deleteTransaction(dueId, txId){
  const due = state.dues.find(d => d.id === dueId);
  if(due) due.transactions = due.transactions.filter(t => t.id !== txId);
  state.confirmDeleteTx = null;
  render();
  saveData();
}

function shareRecords(dueId){
  const due = state.dues.find(d => d.id === dueId);
  if(!due) return;
  const sym = state.settings.defaultCurrency;
  const labels = dueTypeLabels(due.type);
  const { principal, settled, pending } = txTotals(due);
  const lines = [];
  lines.push(`${due.person} \u2014 ${due.type === 'lent' ? 'Lent' : 'Borrowed'}`);
  lines.push(`${labels.principalLabel}: ${formatMoney(principal, sym)}   ${labels.settledLabel}: ${formatMoney(settled, sym)}   Pending: ${formatMoney(Math.max(0,pending), sym)}`);
  lines.push('');
  due.transactions.slice().reverse().forEach(t => {
    const sign = t.amount < 0 ? '-' : '+';
    lines.push(`${formatDate(t.date)}  ${sign}${formatMoney(Math.abs(t.amount), sym)}  ${t.desc}${t.comment ? ' (' + t.comment + ')' : ''}`);
  });
  const text = lines.join('\n');
  if(navigator.share){
    navigator.share({ title: due.person + ' \u2014 BudgetNotes', text }).catch(() => {});
  } else {
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = due.person.replace(/[^a-z0-9]+/gi, '-') + '-records.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify({ sections: state.sections, dues: state.dues, todos: state.todos, settings: state.settings }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'budgetnotes-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(Array.isArray(parsed.sections)){
        state.sections = parsed.sections;
      } else if(Array.isArray(parsed.notes)){
        state.sections = parsed.notes.length ? [{
          id: uid(), name: 'My Notes', duration:'monthly',
          totalBudget: parsed.notes.reduce((s,n)=>s+(Number(n.budget)||0),0),
          currency: state.settings.defaultCurrency || 'Rs ', createdAt: new Date().toISOString(),
          notes: parsed.notes.map(n => ({ id:n.id||uid(), title:n.title||'Untitled note', icon:'', budget:Number(n.budget)||0, entries:(n.entries||[]).map(e=>({id:e.id||uid(),amount:e.amount,desc:e.desc,date:e.date,tag:e.tag||null})), createdAt:n.createdAt||new Date().toISOString() }))
        }] : [];
      } else {
        state.sections = [];
      }
      state.dues = (Array.isArray(parsed.dues) ? parsed.dues : []).map(migrateDue);
      state.todos = Array.isArray(parsed.todos) ? parsed.todos : [];
      state.settings = parsed.settings || state.settings;
      state.importError = null;
      state.showSettings = false;
      render();
      saveData();
    }catch(err){
      state.importError = 'That file could not be read. Make sure it\u2019s a BudgetNotes backup.';
      render();
    }
  };
  reader.readAsText(file);
}

/* ---------- rendering ---------- */

function emptyState(title, body, cta, ctaAction){
  return `<div class="empty">
    <div class="empty-title">${escapeHtml(title)}</div>
    <div class="empty-body">${escapeHtml(body)}</div>
    ${cta ? `<button class="btn-primary" data-action="${ctaAction}">${escapeHtml(cta)}</button>` : ''}
  </div>`;
}

function renderHeader(){
  const isDark = state.settings.theme === 'dark';
  return `
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">BudgetNotes</span>
      <span class="brand-tag">write it. track it.</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" data-action="toggle-theme" title="${isDark ? 'Switch to light theme' : 'Switch to dark theme'}" aria-label="${isDark ? 'Switch to light theme' : 'Switch to dark theme'}">${isDark ? '&#9789;' : '&#9728;'}</button>
      <button class="icon-btn" data-action="open-settings" title="Backup &amp; settings" aria-label="Backup and settings">&#9881;</button>
    </div>
  </header>
  <nav class="tabs" role="tablist">
    <button class="tab ${state.tab==='home'?'active':''}" data-action="set-tab" data-tab="home">Home</button>
    <button class="tab ${state.tab==='notes'?'active':''}" data-action="set-tab" data-tab="notes">Notes</button>
    <button class="tab ${state.tab==='dues'?'active':''}" data-action="set-tab" data-tab="dues">Dues</button>
    <button class="tab ${state.tab==='todos'?'active':''}" data-action="set-tab" data-tab="todos">Todos</button>
  </nav>`;
}

function allEntriesFlat(){
  const out = [];
  state.sections.forEach(s => s.notes.forEach(n => n.entries.forEach(e => out.push(e))));
  return out;
}

function renderHome(){
  const sym = state.settings.defaultCurrency;
  const totalNotes = state.sections.reduce((s,sec) => s + sec.notes.length, 0);
  const totalBudget = state.sections.reduce((s,sec) => s + (Number(sec.totalBudget)||0), 0);
  const totalSpent = allEntriesFlat().reduce((s,e) => s + e.amount, 0);
  const utilized = totalBudget > 0 ? Math.round((totalSpent/totalBudget)*100) : 0;
  const totalSavings = state.sections.reduce((s,sec) => s + sectionSavings(sec), 0);

  const statsCard = `
  <div class="card">
    <div class="stats-row">
      <div class="stat-col"><span class="stat-label">Notes</span><span class="stat-value">${totalNotes}</span></div>
      <div class="stat-col"><span class="stat-label">Budget</span><span class="stat-value">${formatMoney(totalBudget, sym)}</span></div>
      <div class="stat-col"><span class="stat-label">Spent</span><span class="stat-value">${formatMoney(totalSpent, sym)}</span></div>
      <div class="stat-col"><span class="stat-label">Utilized</span><span class="stat-value">${utilized}%</span></div>
    </div>
    <div class="stats-divider"></div>
    <div class="savings-row">
      <span class="savings-label">Total savings</span>
      <span class="savings-value">${formatMoney(totalSavings, sym)}</span>
    </div>
  </div>`;

  const groups = groupEntries(allEntriesFlat());
  const top5 = groups.slice(0,5);
  let leadingCard;
  if(top5.length === 0){
    leadingCard = `<div class="card leading-card">${emptyState('No expenses yet', 'Once you log a few entries in your notes, your biggest expenses will show up here.', null, null)}</div>`;
  } else {
    const max = Math.max(...top5.map(g => g.amount));
    const legend = { essential:0, discretionary:0, untagged:0 };
    top5.forEach(g => { legend[g.tag] = (legend[g.tag]||0) + g.amount; });
    leadingCard = `
    <div class="card leading-card">
      <h3 class="leading-title">Leading expenses</h3>
      <p class="leading-sub">Items that cost you the most</p>
      <div class="rank-list">
        ${top5.map((g,i) => `
          <div class="rank-row">
            <span class="rank-num">${i+1}.</span>
            <span class="rank-desc">${escapeHtml(g.desc)}</span>
            <span class="rank-bar"><span class="rank-bar-fill" style="width:${Math.max(6, Math.round(g.amount/max*100))}%"></span></span>
            <span class="rank-amount mono">${formatMoney(g.amount, sym)}</span>
          </div>`).join('')}
      </div>
      <div class="legend-row">
        <span class="legend-item"><span class="legend-dot dot-essential"></span>Essential: ${formatMoney(legend.essential, sym)}</span>
        <span class="legend-item"><span class="legend-dot dot-discretionary"></span>Discretionary: ${formatMoney(legend.discretionary, sym)}</span>
        <span class="legend-item"><span class="legend-dot dot-untagged"></span>Untagged: ${formatMoney(legend.untagged, sym)}</span>
      </div>
    </div>`;
  }

  return `<div class="view">${statsCard}${leadingCard}</div>`;
}

function noteRow(section, note){
  const spent = noteSpent(note);
  const pct = note.budget > 0 ? (spent/note.budget*100) : 0;
  const clamped = Math.min(100, Math.max(0, pct));
  const status = pct > 100 ? 'coral' : (pct >= 70 ? 'amber' : 'sage');
  return `
  <div class="note-row" data-action="open-note" data-section-id="${section.id}" data-note-id="${note.id}" role="button" tabindex="0">
    <div class="note-row-top">
      <span class="note-row-title">${note.icon ? escapeHtml(note.icon)+' ' : ''}${escapeHtml(note.title)}</span>
      <span class="note-row-amount">${formatMoney(spent, section.currency)} / ${formatMoney(note.budget, section.currency)}</span>
    </div>
    <div class="bar bar-${status} note-row-bar"><div class="bar-fill" style="width:${clamped}%"></div></div>
  </div>`;
}

function sectionCard(section){
  const expanded = !!state.expandedSectionIds[section.id];
  const allocated = sectionAllocated(section);
  const spent = sectionSpent(section);
  const savings = sectionSavings(section);
  const pct = section.totalBudget > 0 ? (spent/section.totalBudget*100) : 0;
  const clamped = Math.min(100, Math.max(0, pct));
  const status = pct > 100 ? 'coral' : (pct >= 70 ? 'amber' : 'sage');
  const isConfirm = state.confirmDeleteSection === section.id;
  return `
  <div class="card section-card">
    <div class="section-top" data-action="toggle-section" data-id="${section.id}" role="button" tabindex="0">

        <button class="icon-btn ghost ${isConfirm?'danger':''}" data-action="${isConfirm?'confirm-delete-section':'ask-delete-section'}" data-id="${section.id}" title="Delete section" aria-label="Delete section">${isConfirm?'Delete?':'\u2715'}</button>
        <span class="chevron ${expanded?'open':''}">&#9656;</span>
      </div>
    </div>
    <div class="section-stats">
      <span>Budget <b class="mono">${formatMoney(section.totalBudget, section.currency)}</b></span>

      <span>Savings <b class="mono">${formatMoney(savings, section.currency)}</b></span>

    <div class="bar bar-${status}"><div class="bar-fill" style="width:${clamped}%"></div></div>

      <div class="section-expand">
        ${section.notes.length === 0 ? `<p class="ink-faint" style="font-size:13px;margin:4px 0 8px;">No notes in this section yet.</p>` : section.notes.map(n => noteRow(section, n)).join('')}

function bi_row(g, note, section){

  return `<div class="bi-row">
    <span class="mono">${formatMoney(g.amount, section.currency)}</span>
    <span>${escapeHtml(g.desc)}${g.count>1?` <span class="ink-faint">(x${g.count})</span>`:''}</span>
    <span class="bi-pct">${pct}%</span>
  </div>`;
}

}

function renderNoteDetail(section, note){

  const groups = groupEntries(note.entries);
  const availableToAllocate = sectionSavings(section);

  return `
  <div class="view">
    <button class="link-back" data-action="back-to-sections">&larr; ${escapeHtml(section.name)}</button>
    <div class="detail-head">
      <h2 class="note-title-lg">${note.icon ? escapeHtml(note.icon)+' ' : ''}${escapeHtml(note.title)}</h2>
      <div class="budget-edit">

        <input id="note-budget-input" class="budget-input-inline" type="number" min="0" step="0.01" value="${note.budget}" data-section-id="${section.id}" data-note-id="${note.id}" />

    </div>
    <div class="bar bar-${status} bar-lg"><div class="bar-fill" style="width:${clamped}%"></div></div>
    <div class="detail-stats">

      <span class="ink-faint">&middot;</span>

    </div>

    ${groups.length > 0 ? `

      <button type="submit" class="btn-primary small">Add</button>
    </form>

    <div style="margin-top:18px;">
      <button class="btn-secondary small ${state.confirmDeleteNote===(section.id+':'+note.id)?'danger':''}" data-action="${state.confirmDeleteNote===(section.id+':'+note.id)?'confirm-delete-note':'ask-delete-note'}" data-section-id="${section.id}" data-note-id="${note.id}">${state.confirmDeleteNote===(section.id+':'+note.id)?'Confirm delete note':'Delete this note'}</button>

function todoRow(t, opts){
  opts = opts || {};
  const isConfirm = state.confirmDeleteTodo === t.id;
  return `
  <div class="todo-row ${t.done?'done':''}">
    <button class="todo-check ${t.done?'checked':''}" data-action="toggle-todo" data-id="${t.id}" aria-label="${t.done?'Mark not done':'Mark done'}">${t.done?'\u2713':''}</button>
    <span class="todo-text">${escapeHtml(t.text)}</span>
    ${opts.showDate ? `<span class="ink-faint todo-date-tag">${formatDate(t.date)}</span>` : ''}
    <button class="icon-btn ghost ${isConfirm?'danger':''}" data-action="${isConfirm?'confirm-delete-todo':'ask-delete-todo'}" data-id="${t.id}" aria-label="Delete task">${isConfirm?'Confirm':'\u2715'}</button>
  </div>`;
}

function renderTodosView(){
  const today = todayStr();
  const viewDate = state.todoDate || today;
  const isToday = viewDate === today;
  let dayTodos = state.todos.filter(t => t.date === viewDate);
  dayTodos = dayTodos.slice().sort((a,b) => (a.done?1:0) - (b.done?1:0));
  const carriedOver = isToday ? state.todos.filter(t => t.date < viewDate && !t.done) : [];
  const totalForProgress = dayTodos.length + carriedOver.length;
  const doneCount = dayTodos.filter(t => t.done).length;
  const pct = totalForProgress > 0 ? Math.round(doneCount/totalForProgress*100) : 0;

  return `
  <div class="view">
    <div class="todo-nav">
      <button class="icon-btn" data-action="todo-prev-day" aria-label="Previous day">&#8249;</button>
      <span class="todo-date-main">${formatTodoDateLabel(viewDate)}</span>
      <button class="icon-btn" data-action="todo-next-day" aria-label="Next day">&#8250;</button>
    </div>
    ${!isToday ? `<button class="link-back" data-action="todo-jump-today" style="display:block;margin:0 auto 14px;">&larr; Back to today</button>` : ''}

    ${totalForProgress > 0 ? `
      <div class="bar bar-sage"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="todo-progress-label">${doneCount} of ${totalForProgress} done</div>
    ` : ''}

    <form class="entry-form" data-form="todo" data-date="${viewDate}">
      <input id="todo-input" name="todo" type="text" autocomplete="off" placeholder="${isToday ? 'What do you need to do today?' : 'Add a task for this day'}" />
      <button type="submit" class="btn-primary small">Add</button>
    </form>

    ${carriedOver.length > 0 ? `
      <div class="todo-section-label">Carried over</div>
      <div class="todo-list">${carriedOver.map(t => todoRow(t, {showDate:true})).join('')}</div>
    ` : ''}

    ${dayTodos.length > 0
      ? `${carriedOver.length > 0 ? `<div class="todo-section-label">${isToday ? 'Today' : 'This day'}</div>` : ''}<div class="todo-list">${dayTodos.map(t => todoRow(t, {showDate:false})).join('')}</div>`
      : (carriedOver.length === 0 ? emptyState(
          isToday ? 'Nothing on your list' : 'No tasks for this day',
          isToday ? 'Add something below to get started.' : 'Tasks you add here will only show up on this day.',
          null, null) : '')}
  </div>`;
}

}

function attachLivePreview(){

  const preview = document.getElementById('entry-preview');
  if(!input || !preview || !state.openNote) return;

  const update = () => {
    const v = input.value.trim();
    const match = v.match(/^(-?[\d,]+(?:\.\d{1,2})?)\s+(.+)$/);
    if(match && section){
      preview.textContent = formatMoney(parseFloat(match[1].replace(/,/g,'')), section.currency) + ' \u2192 ' + match[2].trim();
      preview.className = 'entry-preview valid';
    } else if(v){
      preview.textContent = 'Start with a number, like \u201c150 Groceries\u201d';
      preview.className = 'entry-preview hint';
    } else {
      preview.textContent = '';
      preview.className = 'entry-preview';
    }
  };
  input.addEventListener('input', update);
  update();
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = `<div class="loading">Loading your notes&hellip;</div>`;
    return;
  }
  let html = renderHeader();
  html += `<main class="main">`;
  if(state.migrationNotice){
    html += `<div class="toast-info">${escapeHtml(state.migrationNotice)}</div>`;
  }
  if(state.tab === 'home'){
    html += renderHome();
  } else if(state.tab === 'notes'){
    if(state.openNote){
      const section = findSection(state.openNote.sectionId);
      const note = section ? findNote(section.id, state.openNote.noteId) : null;
      html += (section && note) ? renderNoteDetail(section, note) : renderSectionsList();
    } else {
      html += renderSectionsList();
    }
  } else if(state.tab === 'dues'){
    html += renderDuesView();
  } else if(state.tab === 'todos'){
    html += renderTodosView();
  }
  if(state.error){
    html += `<div class="toast-error">${escapeHtml(state.error)}</div>`;
  }
  html += `</main>`;
  if(state.showNewSection) html += sectionModal();
  if(state.showNewNoteFor) html += noteModal();
  if(state.showNewDue) html += newDueModal();
  if(state.showAddTxFor) html += addTransactionModal();
  if(state.editLenderId) html += editLenderModal();
  if(state.showSettings) html += settingsModal();
  app.innerHTML = html;

  if(pendingFocus){
    const el = document.getElementById(pendingFocus);
    if(el) el.focus();
    pendingFocus = null;
  }
  attachLivePreview();
}

function closeAllModals(){
  state.showNewSection = false; state.editSectionId = null;
  state.showNewNoteFor = null; state.showNewDue = false; state.showSettings = false;
  state.showAddTxFor = null; state.editLenderId = null; state.transactionError = null;
}

function init(){
  const app = document.getElementById('app');

  app.addEventListener('click', (e) => {
    if(e.target.classList && e.target.classList.contains('overlay')){
      closeAllModals();
      render();
      return;
    }
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    const id = el.dataset.id;
    const sectionId = el.dataset.sectionId;
    const noteId = el.dataset.noteId;
    const entryId = el.dataset.entryId;
    const dueId = el.dataset.dueId;
    const txId = el.dataset.txId;
    switch(action){
      case 'set-tab':
        state.tab = el.dataset.tab; render(); break;
      case 'open-new-section':
        closeAllModals(); state.showNewSection = true; render(); break;
      case 'ask-edit-section':
        closeAllModals(); state.editSectionId = id; state.showNewSection = true; render(); break;
      case 'open-new-note-for':
        closeAllModals(); state.showNewNoteFor = sectionId; render(); break;
      case 'open-new-due':
        closeAllModals(); state.showNewDue = true; render(); break;
      case 'open-settings':
        closeAllModals(); state.showSettings = true; state.importError = null; render(); break;
      case 'toggle-theme':
        toggleTheme(); break;
      case 'close-modal':
        closeAllModals();
        render(); break;
      case 'toggle-section':
        state.expandedSectionIds[id] = !state.expandedSectionIds[id]; render(); break;
      case 'ask-delete-section':
        state.confirmDeleteSection = id; render(); break;
      case 'confirm-delete-section':
        deleteSection(id); break;
      case 'open-note':
        state.openNote = { sectionId, noteId }; state.entryError = null; render(); break;
      case 'back-to-sections':
        state.openNote = null; render(); break;
      case 'ask-delete-note':
        state.confirmDeleteNote = sectionId + ':' + noteId; render(); break;
      case 'confirm-delete-note':
        deleteNote(sectionId, noteId); break;
      case 'ask-delete-entry':
        state.confirmDeleteEntry = entryId; render(); break;
      case 'confirm-delete-entry':
        deleteEntry(sectionId, noteId, entryId); break;
      case 'cycle-tag':
        cycleTag(sectionId, noteId, entryId); break;
      case 'set-dues-tab':
        state.duesTab = el.dataset.duestab; render(); break;
      case 'toggle-due':
        state.expandedDueId = state.expandedDueId === id ? null : id; render(); break;
      case 'open-edit-lender':
        closeAllModals(); state.editLenderId = id; render(); break;
      case 'open-add-tx':
        closeAllModals(); state.showAddTxFor = id; render(); break;
      case 'ask-delete-tx':
        state.confirmDeleteTx = txId; render(); break;
      case 'confirm-delete-tx':
        deleteTransaction(dueId, txId); break;
      case 'share-due':
        shareRecords(id); break;
      case 'ask-delete-due':
        state.confirmDeleteDue = id; render(); break;
      case 'confirm-delete-due':
        deleteDue(id); break;
      case 'toggle-todo':
        toggleTodo(id); break;
      case 'ask-delete-todo':
        state.confirmDeleteTodo = id; render(); break;
      case 'confirm-delete-todo':
        deleteTodo(id); break;
      case 'todo-prev-day':
        state.todoDate = shiftDateStr(state.todoDate || todayStr(), -1); render(); break;
      case 'todo-next-day':
        state.todoDate = shiftDateStr(state.todoDate || todayStr(), 1); render(); break;
      case 'todo-jump-today':
        state.todoDate = todayStr(); render(); break;
      case 'export-data':
        exportData(); break;
      case 'trigger-import': {
        const f = document.getElementById('import-file');
        if(f) f.click();
        break;
      }
      default: break;
    }
  });

  app.addEventListener('keydown', (e) => {
    if((e.key === 'Enter' || e.key === ' ') && e.target.matches('[data-action][role="button"]')){
      e.preventDefault();
      e.target.click();
    }
  });

  app.addEventListener('submit', (e) => {
    e.preventDefault();
    const form = e.target;
    if(form.dataset.form === 'section'){
      let currency = form.elements['currency'].value;
      if(currency === 'custom') currency = form.elements['customCurrency'].value || 'Rs ';
      const payload = { name: form.elements['name'].value, totalBudget: form.elements['totalBudget'].value, duration: form.elements['duration'].value, currency };
      if(form.dataset.editId){ updateSection(form.dataset.editId, payload); }
      else { createSection(payload); }
    } else if(form.dataset.form === 'note'){
      createNoteInSection(form.dataset.sectionId, {
        title: form.elements['title'].value,
        icon: form.elements['icon'].value,
        budget: form.elements['budget'].value
      });
    } else if(form.dataset.form === 'entry'){
      addEntry(form.dataset.sectionId, form.dataset.noteId, form.elements['entry'].value);
    } else if(form.dataset.form === 'new-due'){
      createLender({
        type: form.elements['type'].value,
        person: form.elements['person'].value
      });
    } else if(form.dataset.form === 'transaction'){
      const sign = e.submitter ? e.submitter.dataset.sign : null;
      addTransaction(form.dataset.dueId, form.elements['transaction'].value, sign);
    } else if(form.dataset.form === 'rename-lender'){
      renameLender(form.dataset.dueId, form.elements['person'].value);
    } else if(form.dataset.form === 'todo'){
      addTodo(form.dataset.date, form.elements['todo'].value);
    }
  });

  app.addEventListener('change', (e) => {
    if(e.target.id === 'import-file' && e.target.files[0]){
      importData(e.target.files[0]);
    }
    if(e.target.id === 'default-currency-select'){
      state.settings.defaultCurrency = e.target.value;
      saveData();
    }
    if(e.target.id === 'note-budget-input'){
      updateNoteBudget(e.target.dataset.sectionId, e.target.dataset.noteId, e.target.value);
    }
    if(e.target.name === 'currency'){
      const form = e.target.closest('form');
      const customInput = form && form.querySelector('.custom-currency-input');
      if(customInput) customInput.style.display = e.target.value === 'custom' ? 'block' : 'none';
    }
    if(e.target.name === 'duration'){
      const form = e.target.closest('form');
      if(form && form.dataset.form === 'section' && !form.dataset.editId){
        const nameInput = form.elements['name'];
        if(nameInput && !nameInput.dataset.touched){
          nameInput.value = suggestSectionName(e.target.value);
        }
      }
    }
    if(e.target.name === 'name'){
      e.target.dataset.touched = 'true';
    }
  });

  loadData();
}

init();
})();
</script>
</body>
</html>
